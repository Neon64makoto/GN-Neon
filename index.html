<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8">

<style>
body { background:black; color:white; font-family:Arial,sans-serif; margin:0; padding:0; }

input { margin:4px; font-size:1em; }
button { margin:4px; font-size:1em; padding:8px 12px; border:none; border-radius:4px; background:#444; color:white; cursor:pointer; }
button:hover { background:#666; }

#scratchFrame { width:100%; height:70vh; border:none; }

#content {
  width: 100%;
  height: calc(100vh - 150px);
  box-sizing: border-box;
  padding: 20px;
}

#axesLabels {
  position: absolute;
  font-size: 0.8em;
  color: #ccc;
}

/* NEW */
.sideBox {
  width: 20%;
  padding: 10px;
  background:#111;
  border:1px solid #333;
  border-radius:8px;
  overflow-y:auto;
  height:70vh;
}

.centerBox {
  width: 60%;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

@media(max-width: 800px){
  body { font-size: 1.2em; }
  .sideBox { display:none; }
  .centerBox { width:100%; }
}
</style>
</head>

<body>

<div style="text-align:center; padding:10px; background:#111; border-bottom:1px solid #333;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<h1 style="text-align:center;">GN-Gassy</h1>
<div id="content">Loading...</div>

<div style="position:fixed; bottom:5px; right:10px; color:gray; font-size:12px;">
  v0.20 <!-- INCREMENT THIS EVERY UPDATE -->
</div>

<script>

// ------------- PAGES -------------
const pages = {

home: `
<h2>Home</h2>
<p>Welcome to GN-Gassy.</p>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200" style="border-radius:8px;"><br><br>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200" style="border-radius:8px;">
`,

calc: `
<h2>Calculators</h2>
<button onclick="showCalc('simple')">Simple</button>
<button onclick="showCalc('volume')">Volume</button>
<button onclick="showCalc('graph')">Graph</button>
<div id="calcArea"></div>
`,

games: `
<h2>Scratch Games</h2>

<div style="display:flex; gap:10px; align-items:center; justify-content:center;">

  <div class="sideBox">
    <h3>Controls</h3>
    <p id="gameControls"></p>
  </div>

  <div class="centerBox">
    <button onclick="prevGame()">◀</button>
    <button onclick="nextGame()">▶</button>
    <br><br>
    <iframe id="scratchFrame" allowfullscreen></iframe>
    <h3 id="gameTitle"></h3>
  </div>

  <div class="sideBox">
    <h3>Notes / Credits</h3>
    <p id="gameNotes"></p>
  </div>

</div>
`,

about: `
<h2>About</h2>
<p>This is GN-Gassy.</p>
`
};

// Load page
function load(page){
  document.getElementById("content").innerHTML = pages[page];

  if(page==='games'){
    currentIndex = 0;
    updateGame();
  }
}

// ENTER KEY SUPPORT
function enterRun(e, fn){
  if(e.key === "Enter") fn();
}

// ------------- CALCULATORS -------------
function showCalc(type){
  const c = document.getElementById('calcArea');

  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3" onkeydown="enterRun(event, calcSimple)">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>

      Cube (Side):
      <input id="cubeSide" onkeydown="enterRun(event, volCube)">
      <button onclick="volCube()">Calc</button>
      <p id="cubeOut"></p>

      Sphere (Radius):
      <input id="sphereR" onkeydown="enterRun(event, volSphere)">
      <button onclick="volSphere()">Calc</button>
      <p id="sphereOut"></p>

      Rectangular Prism (Length, Width, Height):
      <input id="recL" placeholder="Length" onkeydown="enterRun(event, volRect)">
      <input id="recW" placeholder="Width" onkeydown="enterRun(event, volRect)">
      <input id="recH" placeholder="Height" onkeydown="enterRun(event, volRect)">
      <button onclick="volRect()">Calc</button>
      <p id="rectOut"></p>

      Cylinder (Radius, Height):
      <input id="cylR" placeholder="Radius" onkeydown="enterRun(event, volCyl)">
      <input id="cylH" placeholder="Height" onkeydown="enterRun(event, volCyl)">
      <button onclick="volCyl()">Calc</button>
      <p id="cylOut"></p>

      Pyramid (Base Area, Height):
      <input id="pyrB" placeholder="Base Area" onkeydown="enterRun(event, volPyr)">
      <input id="pyrH" placeholder="Height" onkeydown="enterRun(event, volPyr)">
      <button onclick="volPyr()">Calc</button>
      <p id="pyrOut"></p>
    `;
  }

  else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>

      X: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq2" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq3" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq4" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq5" onkeydown="enterRun(event, drawGraph)"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <div style="position: relative;">
        <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
        <div id="axesLabels"></div>
      </div>
    `;
  }
}

function calcSimple(){
  try {
    simpleOut.innerText = eval(simpleInput.value);
  } catch {
    simpleOut.innerText = "Error";
  }
}

// ------------- VOLUME -------------
function volCube(){
  const v = parseFloat(cubeSide.value);
  cubeOut.innerText = !isNaN(v) ? v**3 : "Invalid";
}

function volSphere(){
  const v = parseFloat(sphereR.value);
  sphereOut.innerText = !isNaN(v) ? (4/3*Math.PI*v**3) : "Invalid";
}

function volRect(){
  const l = parseFloat(recL.value);
  const w = parseFloat(recW.value);
  const h = parseFloat(recH.value);
  rectOut.innerText = (!isNaN(l)&&!isNaN(w)&&!isNaN(h)) ? l*w*h : "Invalid";
}

function volCyl(){
  const r = parseFloat(cylR.value);
  const h = parseFloat(cylH.value);
  cylOut.innerText = (!isNaN(r)&&!isNaN(h)) ? Math.PI*r*r*h : "Invalid";
}

function volPyr(){
  const b = parseFloat(pyrB.value);
  const h = parseFloat(pyrH.value);
  pyrOut.innerText = (!isNaN(b)&&!isNaN(h)) ? b*h/3 : "Invalid";
}

// ------------- GRAPH -------------
function fixExpr(expr){
  return expr.replace(/(\d)x/g, "$1*x");
}

function drawGraph(){
  const canvas = document.getElementById('grid');
  if(!canvas) return;

  const ctx = canvas.getContext('2d');

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, 400, 400);

  const xminVal = parseFloat(document.getElementById('xmin').value);
  const xmaxVal = parseFloat(document.getElementById('xmax').value);
  const yminVal = parseFloat(document.getElementById('ymin').value);
  const ymaxVal = parseFloat(document.getElementById('ymax').value);

  ctx.strokeStyle="#ddd";
  ctx.lineWidth = 1;
  for(let i=0;i<=400;i+=40){
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
  }

  ctx.strokeStyle="black";
  ctx.lineWidth = 3;

  const xZero = (-xminVal)/(xmaxVal-xminVal)*400;
  const yZero = (ymaxVal)/(ymaxVal-yminVal)*400;

  ctx.beginPath(); ctx.moveTo(xZero,0); ctx.lineTo(xZero,400); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,yZero); ctx.lineTo(400,yZero); ctx.stroke();

  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value];
  const colors = ["red","blue","green","purple","orange"];

  eqs.forEach((expr,i)=>{
    if(!expr) return;

    expr = expr.replace(/(\d)x/g, "$1*x");

    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first=true;

    for(let px=0; px<=400; px++){
      const x = xminVal + (px/400)*(xmaxVal-xminVal);
      let y;

      try { y = eval(expr); } catch { continue; }

      const py = (ymaxVal-y)/(ymaxVal-yminVal)*400;

      if(py>=0 && py<=400){
        if(first){ ctx.moveTo(px,py); first=false; }
        else ctx.lineTo(px,py);
      }
    }

    ctx.stroke();
  });
}

// ------------- GAMES -------------
const games = [
"https://turbowarp.org/10128407/embed?addons=pause,fullscreen",
"https://turbowarp.org/1143765424/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/1075310827/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/941803602/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/973637218/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/883776962/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/898492644/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/916303075/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/978483855/embed?addons=pause,fullscreen&fps=60",
"https://turbowarp.org/959847748/embed?addons=pause,fullscreen&fps=60"
];

const titles = [
"Paper Minecraft (Not Made By Me)",
"Sisyphean Escalator","Gambling but Mid","Laser Dodge","Goober Dodger",
"Neon's Hostile Road","Mid Cookie Clicker","Asteroid Assault",
"Reel 'Em In","Rat Catcher"
];

// NEW
const controls = ["","","","","","","","","",""];
const notes = ["","","","","","","","","",""];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];

  document.getElementById("gameControls").innerText = controls[currentIndex] || "";
  document.getElementById("gameNotes").innerText = notes[currentIndex] || "";
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }

// INIT
load("home");

</script>

</body>
</html>
