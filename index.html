<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --main-color: #0000ff;
      --panel-color: rgba(0, 50, 255, 0.25);
      --music-text: #0000ff;
      --menu-text: #0000ff;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
      --panel-size: 140px;
      --bg-gradient-top: #000000;
      --bg-gradient-bottom: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: linear-gradient(to bottom, var(--bg-gradient-top, #000), var(--bg-gradient-bottom, #000)) no-repeat fixed;
      background-size: cover;
      color: var(--text);
      font-family: Arial, sans-serif;
      transition: opacity 0.5s ease;
      min-height: 100vh;
    }

    /* Splash / Loading Overlay */
    #splashOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #splashOverlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    #splashText {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px var(--main-color);
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    #splashSubtext {
      margin-top: 1rem;
      color: var(--music-text);
      font-size: 1rem;
      pointer-events: none;
    }

    #performanceModeBtn {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      background: rgba(255, 100, 100, 0.7);
      color: #fff;
      border: 2px solid #ff6464;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      pointer-events: auto;
    }

    #performanceModeBtn:hover {
      background: rgba(255, 100, 100, 0.9);
      box-shadow: 0 0 15px rgba(255, 100, 100, 0.8);
      transform: scale(1.05);
    }

    @keyframes loading-stripes {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 40px 40px;
      }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--main-color);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--main-color);
    }

    /* Firefox scrollbar styling */
    * {
      scrollbar-color: var(--main-color) #0a0a0a;
      scrollbar-width: thin;
    }

    body.video-bg {
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input, textarea {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 1.25rem 2rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: var(--main-color);
      color: var(--button-text-color, white);
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease, color 0.2s ease;
    }

    button:hover {
      background: var(--main-color);
      box-shadow: 0 0 15px var(--main-color);
      transform: translateY(-2px);
    }
    
    button.under-construction {
      background: #333;
      border-color: #555;
      color: #888;
      cursor: not-allowed;
      position: relative;
    }
    
    button.under-construction:hover {
      background: #444;
      border-color: #666;
      color: #aaa;
      box-shadow: none;
      transform: none;
    }
    
    button.under-construction:hover span {
      display: none;
    }
    
    button.under-construction:hover::after {
      content: "Under Construction";
    }

    input, textarea {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    /* ═══════════════════════════════════════════════════════════
       UNIFIED DIAGONAL PANEL LAYOUT (Opera GX style)
       ═══════════════════════════════════════════════════════════ */

    /* ─── LOGO CONNECTOR (corner piece) ─────────────────────── */
    .logo-connector {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: var(--panel-size);
      z-index: 620; /* Higher than topbar and left-panel */
      background: rgba(17, 17, 17, 0.97);
      border: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--main-color), inset 0 0 15px var(--panel-color);
      transform: translate(-100%, -100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 0;
      font-size: 3rem; 
    }

    .logo-connector.visible {
      transform: translate(0, 0);
      opacity: 1;
    }

    .logo-connector span {
      font-size: 0.55rem;
      font-weight: bold;
      color: var(--main-color);
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--main-color);
      text-align: center;
      line-height: 1.1;
      user-select: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

        /* ─── LEFT PANEL (NAV) ──────────────────────────────────────── */
    .left-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: 100vh;
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-right: 2px solid var(--main-color);
      border-top: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding-top: var(--panel-size);
      display: flex;
      flex-direction: column;
      gap: 0;
      transform: translateX(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .left-panel.visible {
      transform: translateX(0);
    }

    .left-panel.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .left-panel.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .left-panel .nav {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.5rem;
      width: 100%;
    }

    .left-panel .nav button {
      width: 100%;
      text-align: left;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      margin: 0;
      background: transparent;
      border: 1px solid var(--panel-color);
      border-radius: 6px;
      color: var(--menu-text);
      transition: all 0.15s;
    }

    .left-panel .nav button:hover {
      background: var(--panel-color);
      border-color: var(--main-color);
      color: #fff;
      transform: translateX(3px);
      box-shadow: 0 0 12px var(--main-color);
    }

      /* ─── TOP PANEL (MUSIC) ──────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--panel-size);
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 2px solid var(--main-color);
      border-left: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-left: var(--panel-size);
      transform: translateY(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .topbar.visible {
      transform: translateY(0);
    }

    .topbar.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .topbar.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .topbar-row1 {
      width: 100%;
      display: none;
    }

    .nav {
      text-align: center;
    }

    .topbar-brand {
      display: none;
    }

    .topbar-right {
      position: absolute;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* ─── DIGITAL CLOCK (7-Segment Style) ─────────────────────────────── */
    #digitalClock {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 630;
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      font-weight: bold;
      color: var(--main-color);
      text-shadow: 0 0 15px var(--main-color);
      padding: 0.6rem 1.2rem;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid var(--main-color);
      border-radius: 8px;
      text-align: center;
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px var(--panel-color);
      transform: translateY(0);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      pointer-events: none;
      user-select: none;
    }

    #digitalClock.topbar-active {
      transform: translateY(var(--panel-size));
    }

    #digitalClock.ui-hidden {
      opacity: 0;
    }

    #digitalClock.ui-hidden.viz-persistent {
      opacity: 1;
    }

    .clock-time {
      letter-spacing: 2px;
    }

    .clock-ampm {
      font-size: 1rem;
      margin-left: 0.4rem;
      opacity: 0.8;
    }

    /* ─── HOVER TRIGGER ZONES ─────────────────────────────────────────────── */
    .trigger-zone-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 50px;
      height: 100vh;
      z-index: 500;
    }

    .trigger-zone-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      z-index: 500;
    }

    #muteBtn {
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      min-width: 60px;
    }

    /* ─── STYLIZED VOLUME SLIDER ─────────────────────────────────────── */
    #volumeSlider {
      -webkit-appearance: none;
      width: 250px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
      border: 1px solid #333;
      cursor: pointer;
      margin-left: 0.5rem;
    }
    #volumeInput {
      width: 60px;
      padding: 0.2rem 0.4rem;
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      color: var(--text);
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--main-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-color);
      border: 1px solid #fff;
    }

    #volumeSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--main-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-color);
      border: 1px solid #fff;
    }

    /* ─── MUSIC CONTROLS ──────────────────────────────────────────────── */
    .music-controls {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      border-top: 1px solid var(--panel-color);
      margin-top: 0.4rem;
    }

    .music-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.25;
    }

    .music-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .music-artist {
      font-size: 0.8rem;
      color: var(--music-text);
    }

    .music-btn-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .music-btn {
      margin: 0;
      padding: 0.35rem 0.65rem;
      font-size: 1rem;
      background: transparent;
      border: 1px solid var(--panel-color);
      border-radius: 6px;
      color: var(--menu-text);
      cursor: pointer;
      transition: all 0.15s;
      min-width: unset;
    }

    .music-btn:hover {
      background: var(--panel-color);
      transform: translateY(-1px);
      border-color: var(--main-color);
      color: #fff;
    }

    .music-btn.active-loop {
      background: var(--panel-color);
      border-color: var(--main-color);
      color: #fff;
    }

    .music-seek-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .music-time {
      font-size: 0.78rem;
      color: var(--music-text);
      white-space: nowrap;
      min-width: 38px;
      text-align: center;
    }

    #seekBar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--main-color) 0%, #333 0%);
      outline: none;
      cursor: pointer;
      margin: 0;
      padding: 0;
      border: none;
    }

    #seekBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--main-color);
      cursor: pointer;
    }

    /* ─── MAIN CONTENT ────────────────────────────────────────────────── */
    .page-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2rem;
      transition: opacity 0.4s;
    }
    .page-shell.wide-shell {
      max-width: 95vw;
    }

    .page-shell.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .site-title {
      margin: 0.5rem 0 1.5rem;
      text-align: center;
      letter-spacing: 0.04em;
      font-size: 3rem;
      color: var(--main-color);
    }

    #content {
      width: 100%;
      min-height: auto;
      padding: 1rem 0 1rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), var(--panel-color));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
    }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 1.5rem;
      align-items: stretch;
    }

    .games-panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), var(--panel-color));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
      width: 90vw;
      margin-left: calc(50% - 45vw);
    }

    .games-panel h2 {
      padding: 2rem 2rem 1rem 2rem;
      margin: 0;
    }

    .games-menu {
      padding: 0 2rem 2rem 2rem;
      text-align: center;
    }

    #gamesContent {
      width: 100%;
    }

    .hero-panel h2,
    .patch-panel h3,
    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      margin-top: 0;
      font-size: 2rem;
    }

    .lead {
      color: #d2d2d2;
      line-height: 1.6;
      font-size: 1.15rem;
    }

    .image-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .image-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }

    .image-card img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .image-card span {
      display: block;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .patch-panel {
      padding: 2rem;
      position: relative;
      overflow: hidden;
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .version-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--main-color);
      background: var(--panel-color);
      color: var(--main-color);
      font-size: 0.9rem;
    }

    .patch-list {
      margin: 1rem 0 0;
      padding-left: 1.5rem;
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .patch-list li + li {
      margin-top: 0.75rem;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .calc-panel,
    .games-panel,
    .about-panel {
      padding: 2rem;
    }

    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      font-size: 2rem;
    }

    .calc-panel h3,
    .games-panel h3,
    .about-panel h3 {
      font-size: 1.5rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #scratchFrame {
      width: 100%;
      height: 55vh;
      border: none;
      border-radius: 10px;
      background: #000;
    }

    .games-layout {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      padding: 0.5rem 1rem 1rem 1rem;
      margin: 0;
      box-sizing: border-box;
    }

    .games-menu {
      text-align: center;
    }

    .games-menu button {
      display: block;
      width: 40%;
      margin: 0.5rem auto;
      font-size: 1rem;
      padding: 0.75rem 1rem;
    }

    .back-button {
      display: block;
      margin: 0.5rem auto 1rem;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
    }

    .wip-container {
      text-align: center;
      padding: 2rem 1rem;
    }

    .wip-container h2 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .wip-container p {
      color: #b3b3b3;
      font-size: 1rem;
    }

    .sideBox {
      width: 18%;
      padding: 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      overflow-y: auto;
      height: 55vh;
      box-shadow: var(--shadow);
      font-size: 0.9rem;
    }

    .centerBox {
      width: 50%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .sideBox {
      flex-shrink: 0;
    }

    #gameControls,
    #gameNotes {
      white-space: pre-line;
      color: #ddd;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }

    #grid {
      border: 1px solid white;
      background: #000;
    }

    #axesLabels {
      position: absolute;
      font-size: 0.8em;
      color: #ccc;
    }

    #graphResults {
      margin-top: 1rem;
      padding: 1rem;
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: left;
      font-size: 1.05rem;
    }

    .version-tag {
      position: fixed;
      bottom: 5px;
      right: 10px;
      color: gray;
      font-size: 0.85rem;
      z-index: 200;
      transition: opacity 0.4s;
    }

    .version-tag.ui-hidden {
      opacity: 0;
    }

    /* ─── AUDIO VISUALIZER ────────────────────────────────────────────── */
    #visualizerCanvas {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 175vh;
      z-index: -1;
      pointer-events: none;
      display: block;
    }

    /* ─── NEW TOOLS & SECTIONS ─────────────────────────────────────────── */
    .embed-container { width: 100%; height: 80vh; border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-top: 1rem; }
    .embed-container iframe { width: 100%; height: 100%; border: none; }
    #ideContainer { display: flex; flex-direction: row; gap: 1rem; height: 400px; }
    #ideInput { flex: 1; height: 100%; background: #111; color: #0f0; font-family: monospace; margin: 0; }
    #ideOutput { flex: 1; height: 100%; background: white; border-radius: 8px; border: none; }
    #paintingCanvas { background: white; border-radius: 8px; display: block; margin: 0 auto; }
    #chatContainer { height: 400px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let currentIndex = 0;
let isMuted = false;
let currentTrack = 0;
let isLooping = false;
let seekDragging = false;
let isVisualizerMode = false;
let keepClockInViz = false;

const DEFAULT_COLORS = {
  '--main-color': '#0000ff',
  '--panel-color': 'rgba(0, 50, 255, 0.25)',
  '--music-text': '#0000ff',
  '--menu-text': '#0000ff'
};

let rainbowStates = {
  '--main-color': { active: false, speed: 5 },
  '--music-text': { active: false, speed: 5 },
  '--menu-text': { active: false, speed: 5 },
  '--panel-color': { active: false, speed: 5 }
};

function applySongColor(trackIndex) {
  if (!songColorEnabled) return;
  const color = songColors[trackIndex] || '#0000ff';
  document.documentElement.style.setProperty('--main-color', color);
  document.documentElement.style.setProperty('--music-text', color);
  document.documentElement.style.setProperty('--menu-text', color);
  const rgb = parseInt(color.slice(1), 16);
  const r = (rgb >> 16) & 255;
  const g = (rgb >> 8) & 255;
  const b = rgb & 255;
  document.documentElement.style.setProperty('--panel-color', `rgba(${r}, ${g}, ${b}, 0.25)`);
}

function toggleSongColor() {
  songColorEnabled = !songColorEnabled;
  localStorage.setItem('gn_neon_song_color', songColorEnabled.toString());
  if (songColorEnabled) {
    applySongColor(currentTrack);
  } else {
    const saved = localStorage.getItem('gn_neon_colors');
    const colors = saved ? JSON.parse(saved) : { ...DEFAULT_COLORS };
    document.documentElement.style.setProperty('--main-color', colors['--main-color']);
    document.documentElement.style.setProperty('--music-text', colors['--music-text']);
    document.documentElement.style.setProperty('--menu-text', colors['--menu-text']);
    document.documentElement.style.setProperty('--panel-color', colors['--panel-color']);
  }
  const buttons = document.querySelectorAll(`button[onclick="toggleSongColor()"]`);
  buttons.forEach(btn => {
    btn.style.background = songColorEnabled ? 'var(--main-color)' : '#333';
    const mainColorValue = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
    const brightness = getColorBrightness(mainColorValue);
    btn.style.color = songColorEnabled ? (brightness > 128 ? '#000' : '#fff') : '#888';
    btn.style.borderColor = songColorEnabled ? 'var(--main-color)' : '#555';
    btn.textContent = songColorEnabled ? 'Enabled' : 'Disabled';
  });
}

let backgroundSettings = {
  useVideo: true,
  gradientTop: '#000000',
  gradientBottom: '#000000',
  rainbowTop: false,
  rainbowBottom: false,
  rainbowTopSpeed: 5,
  rainbowBottomSpeed: 5
};

function updateRainbow() {
  const time = Date.now() / 1000;
  for (const [key, state] of Object.entries(rainbowStates)) {
    if (state.active) {
      const hue = (time * state.speed * 10) % 360;
      if (key === '--panel-color') {
        document.documentElement.style.setProperty(key, `hsla(${hue}, 100%, 50%, 0.15)`);
      } else {
        document.documentElement.style.setProperty(key, `hsl(${hue}, 100%, 50%)`);
      }
    }
  }
  if (backgroundSettings.rainbowTop) {
    const hueTop = (time * backgroundSettings.rainbowTopSpeed * 10) % 360;
    const color = `hsl(${hueTop}, 100%, 50%)`;
    document.documentElement.style.setProperty('--bg-gradient-top', color);
    document.body.style.setProperty('--bg-gradient-top', color);
  }
  if (backgroundSettings.rainbowBottom) {
    const hueBottom = (time * backgroundSettings.rainbowBottomSpeed * 10) % 360;
    const color = `hsl(${hueBottom}, 100%, 50%)`;
    document.documentElement.style.setProperty('--bg-gradient-bottom', color);
    document.body.style.setProperty('--bg-gradient-bottom', color);
  }
  requestAnimationFrame(updateRainbow);
}
updateRainbow();

// ─── CLOCK LOGIC (7-Segment, 12h, No Seconds) ──────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  
  h = h % 12;
  h = h ? h : 12;
  const hStr = String(h).padStart(2, '0');
  
  document.getElementById('clockTime').innerText = `${hStr}:${m}`;
  document.getElementById('clockAmPm').innerText = ampm;
}
setInterval(updateClock, 1000);
updateClock();

// ─── PLAYLIST ────────────────────────────────────────────────────────────────
const playlist = [
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Neon%20Cobra.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Disco%20Pervert.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/They%20Live!.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/One%20Night%20In%20Tokyo.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/A%20Kind%20Of%20Deutsch.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Military%20Fashion%20Show.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Hotline%20-%20Original%20Mix.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Strange%20Timez%20(feat.%20Robert%20Smith).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Not%20Like%20Us.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Notion.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Write%20This%20Down.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Temporary%20Love%20(feat.%20CG5).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Falling%20Down.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Why%20Cant%20This%20Be%20Easy.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/But%20Can%20You%20Do%20This.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Philly%20Nice%20(B-Side).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Pain_is_just_freddy_fazbear.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/dq%20blizzard.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/MC%20Chris%20Is%20Dead.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG%20Waltz%20of%20the%20Forest%20(4K).mp3'
];

const trackMeta = [
  { title: 'SMRPG Rawest Forrest', artist: 'Martin Hagwell' },
  { title: 'Neon Cobra', artist: 'Shockwave-Sound' },
  { title: 'Disco Pervert', artist: 'Nightstop' },
  { title: 'They Live!', artist: 'Evil Nine' },
  { title: 'One Night In Tokyo', artist: 'Beast in Black' },
  { title: 'A Kind of Deutsch', artist: 'And One' },
  { title: 'Military Fashion Show', artist: 'And One' },
  { title: 'Hotline', artist: 'Jasper Byrne' },
  { title: 'Strange Timez', artist: 'Gorillaz' },
  { title: 'Not Like Us', artist: 'Kendrick Lamar' },
  { title: 'Notion', artist: 'The Rare Occasions' },
  { title: 'Write This Down', artist: 'SoulChef' },
  { title: 'Temporary Love', artist: 'The Living Tombstone' },
  { title: 'Falling Down', artist: 'Space Cowboy' },
  { title: 'Why Cant This be Easy', artist: 'Red Vox' },
  { title: 'But Can You Do This', artist: 'Lolnein' },
  { title: 'Philly Nice (B-Side)', artist: 'Rozebud' },
  { title: 'FNAF 1 (trust)', artist: 'Silva Gunner' },
  { title: 'DQ Blizzard', artist: 'MC Chris' },
  { title: 'MC Chris is Dead', artist: 'MC Chris' },
  { title: 'SMRPG Waltz of The Forest', artist: 'Psyguy' }
];

const songColors = [
  '#ff0000',    //SMPRG
  '#ff00ff',    //Neon Cobra
  '#8400ff',    //Disco
  '#00ff00',    //They live
  '#0000ff',    //One night
  '#ff0000',    //A kind of german
  '#ff8800',    //Fashion show
  '#8400ff',    //hotline
  '#00ccff',    //Strange
  '#ff0000',    //Not like us
  '#ff4800',    //Notion
  '#ffe100',    //Write this down
  '#0000ff',    //Temp love
  '#0084ff',    //Falling
  '#00ccff',    //Why cant this be easy
  '#ffff00',    //But can you do
  '#ea00ff',    //Philly
  '#ff7300',    //Fnaf trus
  '#ffffff',    //DQ
  '#00ff00',    //Mc is dead
  '#ff0000'     //SMRPG 2
];

let songColorEnabled = false;

// ─── SPLASH LOGIC ────────────────────────────────────────────────────────────
function enablePerformanceMode(event) {
  event.stopPropagation();
  for (const key in rainbowStates) {
    rainbowStates[key].active = false;
  }
  backgroundSettings.useVideo = false;
  localStorage.setItem('gn_neon_rainbow', JSON.stringify(rainbowStates));
  localStorage.setItem('gn_neon_bg_settings', JSON.stringify(backgroundSettings));
  const videoBg = document.getElementById('videoBg');
  if (videoBg) {
    videoBg.style.opacity = '0';
    videoBg.style.visibility = 'hidden';
  }
  const overlay = document.getElementById('splashOverlay');
  overlay.classList.add('fade-out');
  ensureAudioContext();
  const audio = document.getElementById('bgMusic');
  audio.play().catch(e => console.warn("Audio start blocked:", e));
}

function enterSite() {
  const overlay = document.getElementById('splashOverlay');
  if (overlay.classList.contains('ready')) {
    overlay.classList.add('fade-out');
    ensureAudioContext();
    const audio = document.getElementById('bgMusic');
    audio.play().catch(e => console.warn("Audio start blocked:", e));
  }
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioContextReady = false;

function ensureAudioContext() {
  if (audioContextReady) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const audio = document.getElementById('bgMusic');
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    audioContextReady = true;
  } catch (e) { console.warn(e); }
}

function initMusic() {
  const audio = document.getElementById('bgMusic');
  
  // Load saved music state
  const savedTrack = localStorage.getItem('gn_neon_track');
  const savedTime = localStorage.getItem('gn_neon_time');
  const savedVolume = localStorage.getItem('gn_neon_volume');
  const savedMute = localStorage.getItem('gn_neon_mute');

  if (savedTrack !== null) currentTrack = parseInt(savedTrack);
  audio.src = playlist[currentTrack];
  
  if (savedVolume !== null) {
    audio.volume = parseFloat(savedVolume);
    document.getElementById('volumeSlider').value = audio.volume * 100;
    document.getElementById('volumeInput').value = Math.round(audio.volume * 100);
  } else {
    audio.volume = 0.5;
  }

  if (savedMute === 'true') {
    isMuted = true;
    audio.muted = true;
    document.getElementById('muteBtn').innerText = 'Unmute';
  }

  if (savedTime !== null) {
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = parseFloat(savedTime);
    }, { once: true });
  }

  audio.addEventListener('ended', () => isLooping ? (audio.currentTime = 0, audio.play()) : musicNext());
  audio.addEventListener('timeupdate', () => {
    if (!seekDragging) {
      const seekBar = document.getElementById('seekBar');
      seekBar.value = (audio.currentTime / audio.duration) * 100;
      seekBar.style.background = `linear-gradient(to right, var(--main-color) ${seekBar.value}%, #333 ${seekBar.value}%)`;
      document.getElementById('mcCurrent').innerText = fmtTime(audio.currentTime);
      localStorage.setItem('gn_neon_time', audio.currentTime);
    }
  });
  audio.addEventListener('durationchange', () => {
    document.getElementById('mcDuration').innerText = fmtTime(audio.duration);
  });
  updateTrackDisplay();
}

function updateTrackDisplay() {
  const meta = trackMeta[currentTrack];
  document.getElementById('mcTitle').innerText = meta.title;
  document.getElementById('mcArtist').innerText = meta.artist;
  document.getElementById('mcPlayPause').innerText = '▮▮';
  localStorage.setItem('gn_neon_track', currentTrack);
  applySongColor(currentTrack);
}

function fmtTime(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

function musicPlayPause() { 
  const a = document.getElementById('bgMusic'); 
  ensureAudioContext(); 
  if (a.paused) {
    a.play();
    document.getElementById('mcPlayPause').innerText = '▮▮';
  } else {
    a.pause();
    document.getElementById('mcPlayPause').innerText = '▶';
  }
}
function musicNext() { currentTrack = (currentTrack + 1) % playlist.length; const a = document.getElementById('bgMusic'); a.src = playlist[currentTrack]; updateTrackDisplay(); applySongColor(currentTrack); a.play(); }
function musicPrev() { const a = document.getElementById('bgMusic'); if(a.currentTime > 3) a.currentTime = 0; else currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; a.src = playlist[currentTrack]; updateTrackDisplay(); applySongColor(currentTrack); a.play(); }
function musicToggleLoop() { isLooping = !isLooping; document.getElementById('mcLoop').classList.toggle('active-loop', isLooping); }
function musicSeek(v) { const a = document.getElementById('bgMusic'); seekDragging = true; a.currentTime = (v/100)*a.duration; setTimeout(()=>seekDragging=false, 200); }
function setVolume(v) {
  const audio = document.getElementById('bgMusic');
  audio.volume = v / 100;
  document.getElementById('volumeInput').value = v;
  document.getElementById('volumeSlider').value = v;
  if (v > 0) { isMuted = false; document.getElementById('muteBtn').innerText = "Mute"; }
  localStorage.setItem('gn_neon_volume', audio.volume);
  localStorage.setItem('gn_neon_mute', isMuted);
}
function setVolumeFromInput(v) {
  let val = parseInt(v);
  if (isNaN(val)) val = 0;
  if (val > 100) val = 100;
  if (val < 0) val = 0;
  setVolume(val);
}
function toggleMute() { 
  isMuted = !isMuted; 
  const b = document.getElementById('muteBtn'); 
  b.innerText = isMuted ? 'Unmute' : 'Mute'; 
  document.querySelectorAll('audio').forEach(a => a.muted = isMuted);
  localStorage.setItem('gn_neon_mute', isMuted);
}

// ─── VISUALIZER MODE ──────────────────────────────────────────────────────────
function toggleVisualizerMode() {
  isVisualizerMode = !isVisualizerMode;
  const main = document.getElementById('mainContent');
  const top = document.getElementById('topbar');
  const left = document.getElementById('leftPanel');
  const logo = document.getElementById('logoConnector');
  const tag = document.getElementById('vTag');
  const btn = document.getElementById('vizModeBtn');
  const clock = document.getElementById('digitalClock');

  if (isVisualizerMode) {
    main.classList.add('ui-hidden');
    top.classList.add('ui-hidden');
    left.classList.add('ui-hidden');
    logo.classList.add('ui-hidden');
    tag.classList.add('ui-hidden');
    btn.innerText = "Exit Mode";
    clock.classList.add('ui-hidden');
    if (keepClockInViz) {
      clock.classList.add('viz-persistent');
    }
    document.addEventListener('keydown', exitVizOnEsc);
  } else {
    main.classList.remove('ui-hidden');
    top.classList.remove('ui-hidden');
    left.classList.remove('ui-hidden');
    logo.classList.remove('ui-hidden');
    tag.classList.remove('ui-hidden');
    btn.innerText = "Visualizer";
    top.classList.remove('hover-reveal');

// ─── VISUALIZER ──────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('visualizerCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function getRGBFromVariable(varName) {
    const val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    if (val.startsWith('#')) {
      const r = parseInt(val.slice(1, 3), 16), g = parseInt(val.slice(3, 5), 16), b = parseInt(val.slice(5, 7), 16);
      return [r, g, b];
    } else if (val.startsWith('rgb')) {
      const match = val.match(/\d+/g);
      return [parseInt(match[0]), parseInt(match[1]), parseInt(match[2])];
    }
    return [0, 0, 255];
  }

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    if (!audioContextReady || !analyser) { drawIdle(ctx, W, H); return; }
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const barCount = 80, gap = 4, barW = (W - gap * (barCount - 1)) / barCount;
    const [r, g, b] = getRGBFromVariable('--main-color');
    const isRainbow = rainbowStates['--main-color'].active;
    const time = Date.now() / 1000;
    
    for (let i = 0; i < barCount; i++) {
      const val = data[i * 2] || 0;
      const h = (val / 255) * (H * 0.4);
      const opacity = 0.3 + (val / 255) * 0.7;
      
      let color;
      if (isRainbow) {
        const hue = (time * rainbowStates['--main-color'].speed * 10 + (i * 2)) % 360;
        color = `hsla(${hue}, 100%, 50%, ${opacity})`;
      } else {
        color = `rgba(${r}, ${g}, ${b}, ${opacity})`;
      }
      
      ctx.fillStyle = color;
      ctx.fillRect(i * (barW + gap), H - h, barW, h);
      ctx.shadowBlur = 15; ctx.shadowColor = isRainbow ? color : `rgba(${r}, ${g}, ${b}, 0.8)`;
    }
    ctx.shadowBlur = 0;
  }
  
  function drawIdle(ctx, W, H) {
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    const [r, g, b] = getRGBFromVariable('--main-color');
    for (let i = 0; i < barCount; i++) {
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.2)`;
      ctx.fillRect(i * (barW + gap), H - 2, barW, 2);
    }
  }
  draw();
})();

function applySavedColors() {
  const saved = localStorage.getItem('gn_neon_colors');
  if (saved) {
    const colors = JSON.parse(saved);
    for (const [key, val] of Object.entries(colors)) {
      document.documentElement.style.setProperty(key, val);
    }
  }
  const savedRainbow = localStorage.getItem('gn_neon_rainbow');
  if (savedRainbow) {
    rainbowStates = JSON.parse(savedRainbow);
  }
  const savedClockSetting = localStorage.getItem('gn_neon_keep_clock');
  if (savedClockSetting !== null) {
    keepClockInViz = savedClockSetting === 'true';
  }
  const savedBgSettings = localStorage.getItem('gn_neon_bg_settings');
  if (savedBgSettings) {
    backgroundSettings = JSON.parse(savedBgSettings);
    updateBackgroundGradient();
  }
  const savedSongColor = localStorage.getItem('gn_neon_song_color');
  if (savedSongColor !== null) {
    songColorEnabled = savedSongColor === 'true';
    if (songColorEnabled) {
      applySongColor(currentTrack);
    }
  }
  updateSettingsButtonAppearances();
}

function updateColor(key, val) {
  if (rainbowStates[key]) rainbowStates[key].active = false;
  document.documentElement.style.setProperty(key, val);
  const saved = localStorage.getItem('gn_neon_colors');
  const colors = saved ? JSON.parse(saved) : { ...DEFAULT_COLORS };
  colors[key] = val;
  localStorage.setItem('gn_neon_colors', JSON.stringify(colors));
  saveRainbow();

function updateRainbowSpeed(key, speed) {

}

function toggleKeepClock() {

function resetColors() {
  for (const [key, val] of Object.entries(DEFAULT_COLORS)) {
    document.documentElement.style.setProperty(key, val);
  }
  for (const key in rainbowStates) rainbowStates[key].active = false;
  
  backgroundSettings = {
    useVideo: true,
    gradientTop: '#000000',
    gradientBottom: '#000000',
    rainbowTop: false,
    rainbowBottom: false,
    rainbowTopSpeed: 5,

function getColorBrightness(hexColor) {
  const hex = hexColor.replace('#', '');
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  return (r * 299 + g * 587 + b * 114) / 1000;
}

function updateNavButtonTextColor() {
  const mainColorValue = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
  const brightness = getColorBrightness(mainColorValue);
  const textColor = brightness > 128 ? '#000' : '#fff';
  document.documentElement.style.setProperty('--button-text-color', textColor);
  const navButtons = document.querySelectorAll('.left-panel .nav button');
  navButtons.forEach(btn => {
    if (btn.style.background === 'var(--main-color)' || btn.style.background.includes('rgb')) {
      btn.style.color = textColor;
    }
  });
}

function drawGraph() {
  const canvas = document.getElementById("grid"); if (!canvas) return;
  const ctx = canvas.getContext("2d"); ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
  const xminVal = parseFloat(xmin.value), xmaxVal = parseFloat(xmax.value), yminVal = parseFloat(ymin.value), ymaxVal = parseFloat(ymax.value), width = 400, height = 400;
  ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) { const x = i * (width / 10), y = i * (height / 10); ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
  ctx.strokeStyle = "white"; ctx.lineWidth = 2;
  const xZero = (-xminVal / (xmaxVal - xminVal)) * width, yZero = (ymaxVal / (ymaxVal - yminVal)) * height;
  ctx.beginPath(); ctx.moveTo(xZero, 0); ctx.lineTo(xZero, height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, yZero); ctx.lineTo(width, yZero); ctx.stroke();
  ctx.fillStyle = "white"; ctx.font = "10px Arial";
  for (let i = 0; i <= 10; i++) { const xVal = xminVal + (i / 10) * (xmaxVal - xminVal), yVal = yminVal + (i / 10) * (ymaxVal - yminVal), px = i * (width / 10), py = height - i * (height / 10); ctx.fillText(xVal.toFixed(1), px, yZero + 10); ctx.fillText(yVal.toFixed(1), xZero + 5, py); }
  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value], colors = ["red", "cyan", "lime", "yellow", "orange"];
  let resultsHTML = "<h3>Results</h3>"; const functions = [];
  eqs.forEach((expr, i) => {
    if (!expr) return; expr = expr.replace(/(\d)x/g, "$1*x");
    let fn; try { fn = (x) => eval(expr.replace(/x/g, "(" + x + ")")); functions.push({ fn, color: colors[i], expr }); } catch { return; }
    ctx.strokeStyle = colors[i]; ctx.lineWidth = 2; ctx.beginPath();
    let first = true;
    for (let px = 0; px <= width; px++) { const x = xminVal + (px / width) * (xmaxVal - xminVal); let y; try { y = fn(x); } catch { continue; } const py = ((ymaxVal - y) / (ymaxVal - yminVal)) * height; if (py >= 0 && py <= height) { if (first) { ctx.moveTo(px, py); first = false; } else { ctx.lineTo(px, py); } } }
    ctx.stroke();
    try { const y0 = fn(0); resultsHTML += `<p style="color:${colors[i]}">y=${expr} → y(0) = ${y0.toFixed(2)}</p>`; } catch {}
  });
  for (let i = 0; i < functions.length; i++) {
    for (let j = i + 1; j < functions.length; j++) {
      for (let x = xminVal; x <= xmaxVal; x += 0.1) {
        let y1, y2; try { y1 = functions[i].fn(x); y2 = functions[j].fn(x); } catch { continue; }
        if (Math.abs(y1 - y2) < 0.1) { resultsHTML += `<p>Intersection ≈ (${x.toFixed(2)}, ${y1.toFixed(2)})</p>`; break; }
      }
    }
  }
  let existing = document.getElementById("graphResults"); if (!existing) { const div = document.createElement("div"); div.id = "graphResults"; canvas.parentElement.appendChild(div); existing = div; } existing.innerHTML = resultsHTML;
}

function runCipher(type, mode) {
  const input = document.getElementById('cipherIn').value;
  let out = "";
  if (type === 'caesar') {
    const shift = mode === 'encode' ? 3 : -3;
    out = input.replace(/[a-z]/gi, c => {
      const code = c.charCodeAt(0);
      const isUpper = code >= 65 && code <= 90;
      const base = isUpper ? 65 : 97;
      let shifted = (code - base + shift) % 26;
      if (shifted < 0) shifted += 26;
      return String.fromCharCode(base + shifted);
    });
  } else if (type === 'atbash') {
    out = input.replace(/[a-z]/gi, c => String.fromCharCode((c <= "Z" ? 155 : 219) - c.charCodeAt(0)));
  }
  document.getElementById('cipherOut').innerText = out;
}

function initCanvas() {

  cvs.onmousedown = (e) => { painting = true; ctx.beginPath(); ctx.moveTo(e.clientX - cvs.getBoundingClientRect().left, e.clientY - cvs.getBoundingClientRect().top); };
  cvs.onmouseup = () => { painting = false; ctx.beginPath(); };
  cvs.onmousemove = (e) => {
    if(!painting) return;
    ctx.lineWidth = document.getElementById('brushSize').value;
    ctx.lineCap = 'round';
    ctx.strokeStyle = document.getElementById('brushColor').value;
    const rect = cvs.getBoundingClientRect();
    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  };
}

    document.getElementById('splashText').innerText = "!!!WARNING MUSIC WILL PLAY!!!";
    document.getElementById('splashSubtext').innerText = "CLICK TO ENTER";
  });
  document.body.insertBefore(video, document.body.firstChild);
  document.body.classList.add('video-bg');
}

applySavedColors();
load("home");
setVideoBackground('https://raw.githubusercontent.com/Neon64makoto/GN-Neon/main/Files/FlatlineLoop.mp4');
initMusic();
</script>
