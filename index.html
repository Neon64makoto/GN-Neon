<!DOCTYPE html>
<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8">
<style>
  body { background:black; color:white; font-family:Arial,sans-serif; margin:0; padding:0; }
  input { margin:2px; }
  button { margin:2px; }
  #scratchFrame { width:80vw; height:70vh; border:none; }
  /* Make the entire content scale with the window */
  #content {
    width: 100%;
    height: calc(100vh - 150px);
    box-sizing: border-box;
    padding: 20px;
  }
  /* Make UI larger for responsiveness */
  @media(max-width: 800px){
    body { font-size: 1.2em; }
  }
</style>
</head>
<body>

<h1 style="text-align:center;">GN-Gassy</h1>

<hr>

<!-- Navigation -->
<div style="text-align:center;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>
<hr>

<div id="content">Loading...</div>

<!-- Version counter -->
<div id="versionCounter" style="position:fixed; bottom:5px; right:10px; color:gray; font-size:12px;">
  v0.13 <!-- IMPORTANT: Increment this decimal every time the code is changed -->
</div>

<script>
// ------------- PAGES -------------
const pages = {
  home: `
    <h2>Home</h2>
    <p>Welcome to GN-Gassy.</p>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200"><br><br>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200">
  `,
  calc: `
    <h2>Calculators</h2>
    <button onclick="showCalc('simple')">Simple Calculator</button>
    <button onclick="showCalc('volume')">Volume Calculator</button>
    <button onclick="showCalc('graph')">Graph Calculator</button>
    <div id="calcContent"></div>
  `,
  games: `
    <h2>Scratch Games</h2>
    <div style="text-align:center;">
      <button onclick="prevGame()">◀</button>
      <button onclick="nextGame()">▶</button>
      <!-- Removed fullscreen button as per request -->
      <br><br>
      <iframe id="scratchFrame" src="" allowfullscreen></iframe>
      <h3 id="gameTitle"></h3>
    </div>
  `,
  about: `
    <h2>About</h2>
    <p>GN-Gassy is a simple injected tool site with calculators, volume calculators, and games.</p>
  `
};

// Helper to initialize the page content
function load(page){
  document.getElementById("content").innerHTML = pages[page];
  if(page==='graph') drawGraph(); // optional initial graph
  if(page==='games') {
    // Load the first game automatically when entering games section
    currentIndex = 0;
    updateGame();
  }
}

// ------------- CALCULATOR HANDLER -------------
function showCalc(type){
  const c = document.getElementById("calcContent");
  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  } else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>
      Cube: <input id="cubeSide" placeholder="Side"> <button onclick="volCube()">Calc</button><p id="cubeOut"></p>
      Sphere: <input id="sphereR" placeholder="Radius"> <button onclick="volSphere()">Calc</button><p id="sphereOut"></p>
      Rectangle: Length<input id="recL" placeholder="L"> Width<input id="recW" placeholder="W"> Height<input id="recH" placeholder="H">
      <button onclick="volRect()">Calc</button><p id="rectOut"></p>
      Cylinder: Radius<input id="cylR" placeholder="R"> Height<input id="cylH" placeholder="H"><button onclick="volCyl()">Calc</button><p id="cylOut"></p>
      Pyramid: Base<input id="pyrB" placeholder="Base area"> Height<input id="pyrH" placeholder="H"><button onclick="volPyr()">Calc</button><p id="pyrOut"></p>
    `;
  } else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>
      X Range: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y Range: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>
      y=<input id="eq1" placeholder="x*x"><br>
      y=<input id="eq2" placeholder=""><br>
      y=<input id="eq3" placeholder=""><br>
      y=<input id="eq4" placeholder=""><br><br>
      <button onclick="drawGraph()">Graph</button><br><br>
      <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
    `;
  }
}

// ------------- SIMPLE CALC -------------
function calcSimple(){
  const val = document.getElementById('simpleInput').value;
  try { document.getElementById('simpleOut').innerText = "Result: "+eval(val); }
  catch(e){ document.getElementById('simpleOut').innerText = "Invalid expression"; }
}

// ------------- VOLUME CALCS -------------
function volCube(){ 
  const side = document.getElementById('cubeSide');
  document.getElementById('cubeOut').innerText = "Volume: "+(parseFloat(side.value)**3); 
}
function volSphere(){ 
  const r = document.getElementById('sphereR');
  document.getElementById('sphereOut').innerText = "Volume: "+((4/3)*Math.PI*Math.pow(parseFloat(r.value),3)); 
}
function volRect(){ 
  document.getElementById('rectOut').innerText = "Volume: "+(parseFloat(document.getElementById('recL').value)*parseFloat(document.getElementById('recW').value)*parseFloat(document.getElementById('recH').value)); 
}
function volCyl(){ 
  document.getElementById('cylOut').innerText = "Volume: "+(Math.PI*Math.pow(parseFloat(document.getElementById('cylR').value),2)*parseFloat(document.getElementById('cylH').value)); 
}
function volPyr(){ 
  document.getElementById('pyrOut').innerText = "Volume: "+(parseFloat(document.getElementById('pyrB').value)*parseFloat(document.getElementById('pyrH').value)/3); 
}

// ------------- GAMES -------------
const games = [
  "https://turbowarp.org/1143765424/embed?addons=pause&fps=60",
  "https://turbowarp.org/1075310827/embed?addons=pause&fps=60",
  "https://turbowarp.org/941803602/embed?addons=pause&fps=60",
  "https://turbowarp.org/973637218/embed?addons=pause&fps=60",
  "https://turbowarp.org/883776962/embed?addons=pause&fps=60",
  "https://turbowarp.org/898492644/embed?addons=pause&fps=60",
  "https://turbowarp.org/916303075/embed?addons=pause&fps=60",
  "https://turbowarp.org/978483855/embed?addons=pause&fps=60",
  "https://turbowarp.org/959847748/embed?addons=pause&fps=60"
];

const titles = [
  "Sisyphean Escalator","Gambling but Mid","Laser Dodge","Goober Dodger",
  "Neon's Hostile Road","Mid Cookie Clicker","Asteroid Assault",
  "Reel 'Em In","Rat Catcher"
];

let currentIndex = 0;

function updateGame(){
  const f = document.getElementById("scratchFrame");
  if(!f) return;
  f.src = games[currentIndex];
  document.getElementById("gameTitle").innerText = titles[currentIndex];
}

function nextGame(){ currentIndex = (currentIndex+1) % games.length; updateGame(); }
function prevGame(){ currentIndex = (currentIndex-1+games.length) % games.length; }

function drawGraph() {
  const canvas = document.getElementById('grid');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Get ranges
  const xmin = parseFloat(document.getElementById('xmin').value);
  const xmax = parseFloat(document.getElementById('xmax').value);
  const ymin = parseFloat(document.getElementById('ymin').value);
  const ymax = parseFloat(document.getElementById('ymax').value);
  
  // Draw axes
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1;
  
  // X axis
  const xZero = (-xmin) / (xmax - xmin) * canvas.width;
  ctx.beginPath();
  ctx.moveTo(xZero, 0);
  ctx.lineTo(xZero, canvas.height);
  ctx.stroke();
  
  // Y axis
  const yZero = (ymax) / (ymax - ymin) * canvas.height;
  ctx.beginPath();
  ctx.moveTo(0, yZero);
  ctx.lineTo(canvas.width, yZero);
  ctx.stroke();
  
  // Plot functions
  const functions = [
    document.getElementById('eq1').value,
    document.getElementById('eq2').value,
    document.getElementById('eq3').value,
    document.getElementById('eq4').value
  ];

  functions.forEach((expr, index) => {
    if (!expr.trim()) return;
    ctx.beginPath();
    ctx.strokeStyle = ['red', 'yellow', 'cyan', 'magenta'][index];
    let firstPoint = true;
    for (let px = 0; px <= canvas.width; px++) {
      const x = xmin + (px / canvas.width) * (xmax - xmin);
      let y;
      try {
        y = eval(expr.replace(/x/g, `(${x})`));
      } catch {
        continue;
      }
      const py = (ymax - y) / (ymax - ymin) * canvas.height;
      if (py >= 0 && py <= canvas.height) {
        if (firstPoint) {
          ctx.moveTo(px, py);
          firstPoint = false;
        } else {
          ctx.lineTo(px, py);
        }
      }
    }
    ctx.stroke();
  });
}

// Initialize first game on load
load("home");
updateGame();

</script>

</body>
</html>
