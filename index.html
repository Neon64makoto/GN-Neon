<!DOCTYPE html>
<html>
<head>
  <title>GN-Gassy</title>
  <meta charset="UTF-8">
</head>
<body>

<h1>GN-Gassy</h1>
<hr>

<!-- Navigation -->
<button onclick="load('home')">Home</button>
<button onclick="load('calc')">Calculators</button>
<button onclick="load('graph')">Graph</button>
<button onclick="load('about')">About</button>
<hr>

<div id="content">Loading...</div>

<script>
// ------------- PAGES -------------
const pages = {
  home: `<h2>Home</h2><p>Welcome to GN-Gassy.</p>`,

  calc: `<h2>Calculators</h2>
    <button onclick="showCalc('simple')">Simple Calculator</button>
    <button onclick="showCalc('volume')">Volume Calculator</button>
    <button onclick="showCalc('graph')">Graph Calculator</button>
    <div id="calcContent"></div>
  `,

  graph: `
    <h2>Graph Calculator</h2>
    X Range: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
    Y Range: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>
    y = <input id="eq1" placeholder="x*x"><br>
    y = <input id="eq2" placeholder=""><br>
    y = <input id="eq3" placeholder=""><br>
    y = <input id="eq4" placeholder=""><br><br>
    <button onclick="drawGraph()">Graph</button><br><br>
    <canvas id="grid" width="400" height="400" style="border:1px solid black;"></canvas>
  `,

  about: `<h2>About</h2>
          <p>GN-Gassy is a simple injected tool site with calculators, volume calculators, and graphing.</p>`
};

// ------------- PAGE LOADER -------------
function load(page) {
  document.getElementById("content").innerHTML = pages[page];
  if(page==='graph') drawGraph(); // optional initial graph
}

// ------------- CALCULATORS HANDLER -------------
function showCalc(type) {
  const content = document.getElementById('calcContent');
  if(type==='simple') {
    content.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="Enter expression, e.g. 2+2*3">
      <button onclick="calcSimple()">Calculate</button>
      <p id="simpleOut"></p>
    `;
  } else if(type==='volume') {
    content.innerHTML = `
      <h3>Volume Calculator</h3>
      Cube: <input id="cubeSide" placeholder="Side length"><button onclick="volCube()">Calc</button><p id="cubeOut"></p>
      Sphere: <input id="sphereR" placeholder="Radius"><button onclick="volSphere()">Calc</button><p id="sphereOut"></p>
      Rectangle: L<input id="recL" placeholder="Length"> W<input id="recW" placeholder="Width"> H<input id="recH" placeholder="Height">
      <button onclick="volRect()">Calc</button><p id="rectOut"></p>
      Cylinder: R<input id="cylR" placeholder="Radius"> H<input id="cylH" placeholder="Height"><button onclick="volCyl()">Calc</button><p id="cylOut"></p>
      Pyramid: B<input id="pyrB" placeholder="Base area"> H<input id="pyrH" placeholder="Height"><button onclick="volPyr()">Calc</button><p id="pyrOut"></p>
    `;
  } else if(type==='graph') {
    load('graph'); // switch to graph page
  }
}

// ------------- SIMPLE CALC -------------
function calcSimple() {
  const val = document.getElementById('simpleInput').value;
  try {
    document.getElementById('simpleOut').innerText = "Result: " + eval(val);
  } catch(e) {
    document.getElementById('simpleOut').innerText = "Invalid expression";
  }
}

// ------------- VOLUME CALCS -------------
function volCube() {
  const s = parseFloat(document.getElementById('cubeSide').value);
  document.getElementById('cubeOut').innerText = "Volume: " + (s*s*s);
}
function volSphere() {
  const r = parseFloat(document.getElementById('sphereR').value);
  document.getElementById('sphereOut').innerText = "Volume: " + ((4/3)*Math.PI*r*r*r);
}
function volRect() {
  const l = parseFloat(document.getElementById('recL').value);
  const w = parseFloat(document.getElementById('recW').value);
  const h = parseFloat(document.getElementById('recH').value);
  document.getElementById('rectOut').innerText = "Volume: " + (l*w*h);
}
function volCyl() {
  const r = parseFloat(document.getElementById('cylR').value);
  const h = parseFloat(document.getElementById('cylH').value);
  document.getElementById('cylOut').innerText = "Volume: " + (Math.PI*r*r*h);
}
function volPyr() {
  const b = parseFloat(document.getElementById('pyrB').value);
  const h = parseFloat(document.getElementById('pyrH').value);
  document.getElementById('pyrOut').innerText = "Volume: " + (b*h/3);
}

// ------------- GRAPH CALCULATOR -------------
function drawGraph() {
  const canvas = document.getElementById("grid");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);

  const xmin = parseFloat(document.getElementById("xmin").value);
  const xmax = parseFloat(document.getElementById("xmax").value);
  const ymin = parseFloat(document.getElementById("ymin").value);
  const ymax = parseFloat(document.getElementById("ymax").value);

  function toX(x){ return (x-xmin)/(xmax-xmin)*w; }
  function toY(y){ return h-(y-ymin)/(ymax-ymin)*h; }

  // grid lines
  ctx.beginPath();
  const stepX = (xmax-xmin)/10;
  const stepY = (ymax-ymin)/10;
  for(let x=xmin;x<=xmax;x+=stepX){
    const px = toX(x);
    ctx.moveTo(px,0);
    ctx.lineTo(px,h);
  }
  for(let y=ymin;y<=ymax;y+=stepY){
    const py = toY(y);
    ctx.moveTo(0,py);
    ctx.lineTo(w,py);
  }
  ctx.strokeStyle="#ccc";
  ctx.stroke();

  // axes
  ctx.beginPath();
  ctx.moveTo(toX(0),0); ctx.lineTo(toX(0),h);
  ctx.moveTo(0,toY(0)); ctx.lineTo(w,toY(0));
  ctx.strokeStyle="#000";
  ctx.stroke();

  // plot equations
  const eqs = [document.getElementById("eq1").value,
               document.getElementById("eq2").value,
               document.getElementById("eq3").value,
               document.getElementById("eq4").value];
  eqs.forEach((eq,i)=>{
    if(!eq) return;
    ctx.beginPath();
    let first=true;
    for(let x=xmin;x<=xmax;x+=(xmax-xmin)/200){
      let y;
      try{ y = eval(eq.replaceAll("x","("+x+")")); }catch{ continue; }
      const px = toX(x);
      const py = toY(y);
      if(first){ ctx.moveTo(px,py); first=false; } else { ctx.lineTo(px,py); }
    }
    ctx.strokeStyle=["red","blue","green","orange"][i%4];
    ctx.stroke();
  });
}

// initial load
load('home');
</script>

</body>
</html>
