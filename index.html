<!DOCTYPE html>
<html>
<head>
  <title>GN-Gassy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:white;margin:0;height:100vh;display:flex;flex-direction:column;">

<h1 style="margin:10px;">GN-Gassy</h1>

<div style="margin:10px;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<div id="content" style="flex:1;overflow:auto;padding:10px;">Loading...</div>

<script>
// -------- PAGES --------
const pages = {

home: `
  <h2>Home</h2>
  <p>Welcome to GN-Gassy.</p>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" style="width:30%;">
  <br><br>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" style="width:30%;">
`,

calc: `
  <h2>Calculators</h2>
  <button onclick="showCalc('simple')">Simple</button>
  <button onclick="showCalc('volume')">Volumes</button>
  <button onclick="showCalc('graph')">Graph</button>
  <div id="calcContent"></div>
`,

games: `
  <h2>Scratch Games</h2>

  <div style="display:flex;height:80vh;gap:10px;">

    <div style="width:20%;">
      <h3>Controls</h3>
      <p id="controlsText">Under Construction</p>
    </div>

    <div style="width:60%;text-align:center;">

      <button onclick="prevGame()">◀</button>
      <button onclick="fullscreenGame()">Fullscreen</button>

      <div id="gameContainer" style="width:100%;height:60vh;">
        <iframe id="scratchFrame"
          allow="fullscreen"
          style="width:100%;height:100%;">
        </iframe>
      </div>

      <button onclick="nextGame()">▶</button>

      <h3 id="gameTitle"></h3>

    </div>

    <div style="width:20%;">
      <h3>Credits</h3>
      <p id="creditsText">Under Construction</p>
    </div>

  </div>
`,

about: `<h2>About</h2><p>GN-Gassy tools site.</p>`
};

// -------- LOAD --------
function load(page){
  document.getElementById("content").innerHTML = pages[page];
}

// -------- CALCS --------
function showCalc(type){
  const c = document.getElementById("calcContent");

  if(type==="simple"){
    c.innerHTML = `
      <input id="simpleInput">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  if(type==="volume"){
    c.innerHTML = `
      Cube <input id="cube"><button onclick="volCube()">Calc</button><p id="o1"></p>
      Sphere <input id="sphere"><button onclick="volSphere()">Calc</button><p id="o2"></p>
      L<input id="l"> W<input id="w"> H<input id="h"><button onclick="volRect()">Calc</button><p id="o3"></p>
      R<input id="cr"> H<input id="ch"><button onclick="volCyl()">Calc</button><p id="o4"></p>
      Base<input id="pb"> H<input id="ph"><button onclick="volPyr()">Calc</button><p id="o5"></p>
    `;
  }

  if(type==="graph"){
    c.innerHTML = `
      X <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1"><br>
      y=<input id="eq2"><br>
      y=<input id="eq3"><br>
      y=<input id="eq4"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <canvas id="grid" style="width:100%;height:60vh;border:1px solid white;"></canvas>
    `;
  }
}

// -------- SIMPLE --------
function calcSimple(){
  try{
    let f = Function("return " + simpleInput.value);
    simpleOut.innerText = f();
  }catch{
    simpleOut.innerText = "Error";
  }
}

// -------- VOLUME --------
function volCube(){ o1.innerText=cube.value**3; }
function volSphere(){ o2.innerText=(4/3)*Math.PI*sphere.value**3; }
function volRect(){ o3.innerText=l.value*w.value*h.value; }
function volCyl(){ o4.innerText=Math.PI*cr.value**2*ch.value; }
function volPyr(){ o5.innerText=(pb.value*ph.value)/3; }

// -------- PARSER --------
function parseEq(eq){
  eq = eq.replace(/\s+/g,"");
  eq = eq.replace(/\^/g,"**");
  eq = eq.replace(/(\d)(x)/g,"$1*$2");
  eq = eq.replace(/x(\d)/g,"x*$1");
  eq = eq.replace(/(\d)\(/g,"$1*(");
  eq = eq.replace(/x\(/g,"x*(");
  eq = eq.replace(/sin/g,"Math.sin");
  eq = eq.replace(/cos/g,"Math.cos");
  eq = eq.replace(/tan/g,"Math.tan");
  eq = eq.replace(/sqrt/g,"Math.sqrt");
  return eq;
}

// -------- GRAPH --------
function drawGraph(){
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  const w = canvas.width;
  const h = canvas.height;

  let xminVal=+xmin.value, xmaxVal=+xmax.value;
  let yminVal=+ymin.value, ymaxVal=+ymax.value;

  function X(x){ return (x-xminVal)/(xmaxVal-xminVal)*w; }
  function Y(y){ return h-(y-yminVal)/(ymaxVal-yminVal)*h; }

  ctx.fillStyle="black";
  ctx.fillRect(0,0,w,h);

  // grid
  ctx.strokeStyle="#333";
  for(let i=0;i<=10;i++){
    let x=xminVal+(xmaxVal-xminVal)/10*i;
    let y=yminVal+(ymaxVal-yminVal)/10*i;
    ctx.beginPath();
    ctx.moveTo(X(x),0); ctx.lineTo(X(x),h);
    ctx.moveTo(0,Y(y)); ctx.lineTo(w,Y(y));
    ctx.stroke();
  }

  // axes
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(X(0),0); ctx.lineTo(X(0),h);
  ctx.moveTo(0,Y(0)); ctx.lineTo(w,Y(0));
  ctx.stroke();

  const equations = [eq1.value,eq2.value,eq3.value,eq4.value];
  const colors = ["red","cyan","lime","yellow"];

  equations.forEach((eq,i)=>{
    if(!eq) return;

    let parsed = parseEq(eq);

    let func;
    try{
      func = Function("x","return "+parsed);
    }catch{
      return;
    }

    ctx.strokeStyle = colors[i];
    ctx.beginPath();

    let step = (xmaxVal - xminVal) / w;
    let first = true;

    for(let x=xminVal; x<=xmaxVal; x+=step){
      let y;
      try{ y = func(x); }
      catch{ continue; }

      if(!isFinite(y)) continue;

      let px = X(x);
      let py = Y(y);

      if(first){
        ctx.moveTo(px,py);
        first=false;
      } else {
        ctx.lineTo(px,py);
      }
    }

    ctx.stroke();
  });
}

// -------- GAMES --------
const games = [
  "https://turbowarp.org/1143765424/embed"
];
const titles = [
  "Sisyphean Escalator"
];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }

function fullscreenGame(){
  const elem=document.getElementById("gameContainer");
  if(elem.requestFullscreen) elem.requestFullscreen();
}

// init
load("home");
</script>

</body>
</html>
