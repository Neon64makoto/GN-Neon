<!DOCTYPE html>
<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8">

<style>
body { background:black; color:white; font-family:Arial,sans-serif; margin:0; padding:0; }

input { margin:4px; font-size:1em; }
button { margin:4px; font-size:1em; padding:8px 12px; border:none; border-radius:4px; background:#444; color:white; cursor:pointer; }
button:hover { background:#666; }

#scratchFrame { width:100%; height:70vh; border:none; }

#content {
  width: 100%;
  height: calc(100vh - 150px);
  box-sizing: border-box;
  padding: 20px;
}

#axesLabels {
  position: absolute;
  font-size: 0.8em;
  color: #ccc;
}

.sideBox {
  width: 20%;
  padding: 10px;
  background:#111;
  border:1px solid #333;
  border-radius:8px;
  overflow-y:auto;
  height:70vh;
}

.centerBox {
  width: 60%;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#gameControls, #gameNotes {
  white-space: pre-line;
}

@media(max-width: 800px){
  body { font-size: 1.2em; }
  .sideBox { display:none; }
  .centerBox { width:100%; }
}
</style>
</head>

<body>

<div style="text-align:center; padding:10px; background:#111; border-bottom:1px solid #333;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<h1 style="text-align:center;">GN-Gassy</h1>
<div id="content">Loading...</div>

<div style="position:fixed; bottom:5px; right:10px; color:gray; font-size:12px;">
  v0.23.0
</div>

<script>

// ------------- PAGES -------------
const pages = {

home: `
<h2>Home</h2>
<p>Welcome to GN-Gassy.</p>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200" style="border-radius:8px;"><br><br>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200" style="border-radius:8px;">
`,

calc: `
<h2>Calculators</h2>
<button onclick="showCalc('simple')">Simple</button>
<button onclick="showCalc('volume')">Volume</button>
<button onclick="showCalc('graph')">Graph</button>
<div id="calcArea"></div>
`,

games: `
<h2>Scratch Games</h2>

<div style="display:flex; gap:10px; align-items:center; justify-content:center;">

  <div class="sideBox">
    <h3>Controls</h3>
    <div id="gameControls"></div>
  </div>

  <div class="centerBox">
    <button onclick="prevGame()">◀</button>
    <button onclick="nextGame()">▶</button>
    <br><br>
    <iframe id="scratchFrame" allowfullscreen></iframe>
    <h3 id="gameTitle"></h3>
  </div>

  <div class="sideBox">
    <h3>Notes / Credits</h3>
    <div id="gameNotes"></div>
  </div>

</div>
`,

about: `
<h2>About</h2>
<p>This is GN-Gassy.</p>
`
};

// Load page
function load(page){
  document.getElementById("content").innerHTML = pages[page];

  if(page==='games'){
    currentIndex = 0;
    updateGame();
  }
}

// ENTER KEY SUPPORT
function enterRun(e, fn){
  if(e.key === "Enter") fn();
}

// ------------- CALCULATORS -------------
function showCalc(type){
  const c = document.getElementById('calcArea');

  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3" onkeydown="enterRun(event, calcSimple)">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>

      Cube (Side):
      <input id="cubeSide" onkeydown="enterRun(event, volCube)">
      <button onclick="volCube()">Calc</button>
      <p id="cubeOut"></p>

      Sphere (Radius):
      <input id="sphereR" onkeydown="enterRun(event, volSphere)">
      <button onclick="volSphere()">Calc</button>
      <p id="sphereOut"></p>

      Rectangular Prism (Length, Width, Height):
      <input id="recL" placeholder="Length" onkeydown="enterRun(event, volRect)">
      <input id="recW" placeholder="Width" onkeydown="enterRun(event, volRect)">
      <input id="recH" placeholder="Height" onkeydown="enterRun(event, volRect)">
      <button onclick="volRect()">Calc</button>
      <p id="rectOut"></p>

      Cylinder (Radius, Height):
      <input id="cylR" placeholder="Radius" onkeydown="enterRun(event, volCyl)">
      <input id="cylH" placeholder="Height" onkeydown="enterRun(event, volCyl)">
      <button onclick="volCyl()">Calc</button>
      <p id="cylOut"></p>

      Pyramid (Base Area, Height):
      <input id="pyrB" placeholder="Base Area" onkeydown="enterRun(event, volPyr)">
      <input id="pyrH" placeholder="Height" onkeydown="enterRun(event, volPyr)">
      <button onclick="volPyr()">Calc</button>
      <p id="pyrOut"></p>
    `;
  }

  else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>

      X: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq2" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq3" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq4" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq5" onkeydown="enterRun(event, drawGraph)"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <div style="position: relative;">
        <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
      </div>
    `;
  }
}

// ------------- GRAPH (UPDATED) -------------
function drawGraph(){
  const canvas = document.getElementById('grid');
  if(!canvas) return;

  const ctx = canvas.getContext('2d');

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 400, 400);

  const xminVal = parseFloat(xmin.value);
  const xmaxVal = parseFloat(xmax.value);
  const yminVal = parseFloat(ymin.value);
  const ymaxVal = parseFloat(ymax.value);

  const width = 400;
  const height = 400;

  ctx.strokeStyle="#333";
  for(let i=0;i<=10;i++){
    let x = i*(width/10);
    let y = i*(height/10);

    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke();
  }

  ctx.strokeStyle="white";
  const xZero = (-xminVal)/(xmaxVal-xminVal)*width;
  const yZero = (ymaxVal)/(ymaxVal-yminVal)*height;

  ctx.beginPath(); ctx.moveTo(xZero,0); ctx.lineTo(xZero,height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,yZero); ctx.lineTo(width,yZero); ctx.stroke();

  ctx.fillStyle="white";
  ctx.font="10px Arial";

  for(let i=0;i<=10;i++){
    let xVal = xminVal + (i/10)*(xmaxVal-xminVal);
    let yVal = yminVal + (i/10)*(ymaxVal-yminVal);

    let px = i*(width/10);
    let py = height - i*(height/10);

    ctx.fillText(xVal.toFixed(1), px, yZero+10);
    ctx.fillText(yVal.toFixed(1), xZero+5, py);
  }

  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value];
  const colors = ["red","cyan","lime","yellow","orange"];

  let resultsHTML = "<h3>Results</h3>";
  let functions = [];

  eqs.forEach((expr,i)=>{
    if(!expr) return;

    expr = expr.replace(/(\d)x/g, "$1*x");

    let fn = (x)=>eval(expr);
    functions.push({fn, color:colors[i], expr});

    ctx.strokeStyle = colors[i];
    ctx.beginPath();

    let first=true;

    for(let px=0; px<=width; px++){
      const x = xminVal + (px/width)*(xmaxVal-xminVal);
      let y;
      try { y = fn(x); } catch { continue; }

      const py = (ymaxVal-y)/(ymaxVal-yminVal)*height;

      if(py>=0 && py<=height){
        if(first){ ctx.moveTo(px,py); first=false; }
        else ctx.lineTo(px,py);
      }
    }

    ctx.stroke();

    try {
      let y0 = fn(0);
      resultsHTML += `<p style="color:${colors[i]}">y=${expr} → y(0)=${y0.toFixed(2)}</p>`;
    } catch {}
  });

  for(let i=0;i<functions.length;i++){
    for(let j=i+1;j<functions.length;j++){
      for(let x=xminVal;x<=xmaxVal;x+=0.1){
        let y1=functions[i].fn(x);
        let y2=functions[j].fn(x);
        if(Math.abs(y1-y2)<0.1){
          resultsHTML += `<p>Intersection ≈ (${x.toFixed(2)}, ${y1.toFixed(2)})</p>`;
          break;
        }
      }
    }
  }

  let div=document.getElementById("graphResults");
  if(!div){
    div=document.createElement("div");
    div.id="graphResults";
    canvas.parentElement.appendChild(div);
  }
  div.innerHTML=resultsHTML;
}

// INIT
load("home");

</script>

</body>
</html>
