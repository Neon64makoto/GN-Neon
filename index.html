<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --accent: #0006ff;
      --accent-soft: rgba(0, 0, 200, 0.14);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: Arial, sans-serif;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      transition: opacity 0.5s ease;
    }

    /* Splash / Loading Overlay */
    #splashOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #splashOverlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    #splashText {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px #0044ff;
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    #splashSubtext {
      margin-top: 1rem;
      color: #7799ff;
      font-size: 1rem;
      pointer-events: none;
    }

    @keyframes loading-stripes {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 40px 40px;
      }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #0600ff;
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0044ff;
    }

    /* Firefox scrollbar styling */
    * {
      scrollbar-color: #0600ff #0a0a0a;
      scrollbar-width: thin;
    }

    body.video-bg {
      background: none;
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: #0900ad;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: #0044ff;
      border-color: #1100ff;
      box-shadow: 0 0 35px rgba(0, 0, 255, 0.95);
      transform: translateY(-1px);
    }

    input {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    /* ─── TOP BAR ─────────────────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      /* auto-hide */
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s;
    }

    .topbar.hidden {
      transform: translateY(-100%);
    }

    .topbar.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .topbar.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .topbar-row1 {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      padding: 0 1rem;
    }

    .nav {
      text-align: center;
    }

    .topbar-brand {
      position: absolute;
      left: 1rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #0600ff;
      letter-spacing: 1px;
    }

    .topbar-right {
      position: absolute;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #muteBtn {
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      min-width: 60px;
    }

    /* ─── STYLIZED VOLUME SLIDER ─────────────────────────────────────── */
    #volumeSlider {
      -webkit-appearance: none;
      width: 100px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
      border: 1px solid #333;
      cursor: pointer;
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #0044ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 68, 255, 0.8);
      border: 1px solid #fff;
    }

    #volumeSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #0044ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 68, 255, 0.8);
      border: 1px solid #fff;
    }

    /* ─── MUSIC CONTROLS ──────────────────────────────────────────────── */
    .music-controls {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 1rem 0.6rem;
      border-top: 1px solid rgba(0, 0, 200, 0.25);
      margin-top: 0.4rem;
    }

    .music-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.25;
    }

    .music-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .music-artist {
      font-size: 0.8rem;
      color: #7799ff;
    }

    .music-btn-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .music-btn {
      margin: 0;
      padding: 0.35rem 0.65rem;
      font-size: 1rem;
      background: transparent;
      border: 1px solid rgba(0, 0, 200, 0.45);
      border-radius: 6px;
      color: #aac0ff;
      cursor: pointer;
      transition: all 0.15s;
      min-width: unset;
    }

    .music-btn:hover {
      background: rgba(0, 0, 255, 0.25);
      transform: translateY(-1px);
      border-color: #0044ff;
      color: #fff;
    }

    .music-btn.active-loop {
      background: rgba(0, 0, 255, 0.35);
      border-color: #0044ff;
      color: #fff;
    }

    .music-seek-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .music-time {
      font-size: 0.78rem;
      color: #7799ff;
      white-space: nowrap;
      min-width: 38px;
      text-align: center;
    }

    #seekBar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #0044ff 0%, #333 0%);
      outline: none;
      cursor: pointer;
      margin: 0;
      padding: 0;
      border: none;
    }

    #seekBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0044ff;
      cursor: pointer;
    }

    /* ─── MAIN CONTENT ────────────────────────────────────────────────── */
    .page-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 8rem 1.5rem 5rem;
      transition: opacity 0.4s;
    }

    .page-shell.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .site-title {
      margin: 0.5rem 0 1.5rem;
      text-align: center;
      letter-spacing: 0.04em;
      font-size: 3rem;
    }

    #content {
      width: 100%;
      min-height: calc(100vh - 200px);
      padding: 1rem 0 2rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), rgba(0, 0, 150, 0.5));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
    }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 1.5rem;
      align-items: start;
    }

    .games-panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), rgba(0, 0, 150, 0.5));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
      width: 90vw;
      margin-left: calc(50% - 45vw);
      position: relative;
    }

    .games-panel h2 {
      padding: 2rem 2rem 1rem 2rem;
      margin: 0;
    }

    .games-menu {
      padding: 0 2rem 2rem 2rem;
      text-align: center;
    }

    #gamesContent {
      width: 100%;
    }

    .hero-panel h2,
    .patch-panel h3,
    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      margin-top: 0;
      font-size: 2rem;
    }

    .lead {
      color: #d2d2d2;
      line-height: 1.6;
      font-size: 1.15rem;
    }

    .image-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .image-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }

    .image-card img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .image-card span {
      display: block;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .patch-panel {
      padding: 2rem;
      position: relative;
      overflow: hidden;
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .version-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 225, 1);
      background: rgba(0, 0, 150, 0.08);
      color: var(--accent);
      font-size: 0.9rem;
    }

    .patch-list {
      margin: 1rem 0 0;
      padding-left: 1.5rem;
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .patch-list li + li {
      margin-top: 0.75rem;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .calc-panel,
    .games-panel,
    .about-panel {
      padding: 2rem;
    }

    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      font-size: 2rem;
    }

    .calc-panel h3,
    .games-panel h3,
    .about-panel h3 {
      font-size: 1.5rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #scratchFrame {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 10px;
      background: #000;
    }

    .games-layout {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      padding: 1rem 2rem 2rem 2rem;
      margin: 0;
      box-sizing: border-box;
    }

    .games-menu {
      text-align: center;
    }

    .games-menu button {
      display: block;
      width: 100%;
      margin: 0.75rem auto;
      font-size: 1.2rem;
      padding: 1rem 1.5rem;
    }

    .back-button {
      display: block;
      margin: 1rem auto 2rem;
      font-size: 1rem;
      padding: 0.7rem 1.2rem;
    }

    .wip-container {
      text-align: center;
      padding: 3rem 1rem;
    }

    .wip-container h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .wip-container p {
      color: #b3b3b3;
      font-size: 1.2rem;
    }

    .sideBox {
      width: 20%;
      padding: 1.25rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      overflow-y: auto;
      height: 70vh;
      box-shadow: var(--shadow);
      font-size: 1rem;
    }

    .centerBox {
      width: 55%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .sideBox {
      flex-shrink: 0;
    }

    #gameControls,
    #gameNotes {
      white-space: pre-line;
      color: #ddd;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }

    #grid {
      border: 1px solid white;
      background: #000;
    }

    #axesLabels {
      position: absolute;
      font-size: 0.8em;
      color: #ccc;
    }

    #graphResults {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: left;
      font-size: 1.05rem;
    }

    .version-tag {
      position: fixed;
      bottom: 5px;
      right: 10px;
      color: gray;
      font-size: 0.85rem;
      z-index: 200;
      transition: opacity 0.4s;
    }

    .version-tag.ui-hidden {
      opacity: 0;
    }

    /* ─── AUDIO VISUALIZER ────────────────────────────────────────────── */
    #visualizerCanvas {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      display: block;
    }

    /* ─── RESPONSIVE ──────────────────────────────────────────────────── */
    @media (max-width: 1200px) {
      html,
      body {
        font-size: 15px;
      }

      .site-title {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 960px) {
      html,
      body {
        font-size: 14px;
      }

      .site-title {
        font-size: 2.2rem;
      }

      .home-grid {
        grid-template-columns: 1fr;
      }

      .games-layout {
        flex-direction: column;
      }

      .sideBox,
      .centerBox {
        width: 100%;
      }

      .patch-panel h3 {
        font-size: 1.3rem;
      }

      .patch-panel {
        max-height: 400px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        font-size: 13px;
      }

      .page-shell {
        padding: 9rem 1rem 5rem;
      }

      .site-title {
        font-size: 1.8rem;
        margin: 0.5rem 0 1rem;
      }

      .hero-panel,
      .patch-panel,
      .calc-panel,
      .games-panel,
      .about-panel {
        padding: 1.5rem;
      }

      .patch-panel {
        max-height: 350px;
      }

      .topbar {
        gap: 0.5rem;
      }

      .topbar-right {
        right: 0.5rem;
      }

      .hero-panel h2,
      .patch-panel h3,
      .calc-panel h2,
      .games-panel h2,
      .about-panel h2 {
        font-size: 1.5rem;
      }

      .image-row {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .sideBox {
        padding: 1rem;
        font-size: 0.9rem;
      }

      #scratchFrame {
        height: 50vh;
      }

      button {
        margin: 0.4rem;
        font-size: 1rem;
        padding: 0.6rem 0.8rem;
      }

      input {
        margin: 0.4rem;
        font-size: 1rem;
        padding: 0.6rem 0.6rem;
      }
    }

    @media (max-width: 480px) {
      html,
      body {
        font-size: 12px;
      }

      .page-shell {
        padding: 9rem 0.75rem 5rem;
      }

      .site-title {
        font-size: 1.5rem;
        margin: 0.4rem 0 0.8rem;
      }

      .hero-panel,
      .patch-panel,
      .calc-panel,
      .games-panel,
      .about-panel {
        padding: 1rem;
      }

      .hero-panel h2,
      .patch-panel h3,
      .calc-panel h2,
      .games-panel h2,
      .about-panel h2 {
        font-size: 1.3rem;
      }

      .button-row {
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      button {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.6rem;
      }

      input {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.5rem;
      }

      .sideBox {
        padding: 0.75rem;
        font-size: 0.85rem;
      }

      #scratchFrame {
        height: 40vh;
      }

      .games-layout {
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body class="video-bg">
  <audio id="bgMusic" style="display:none;" crossorigin="anonymous"></audio>

  <!-- Click to Enter Splash -->
  <div id="splashOverlay" onclick="enterSite()">
    <div id="splashText">LOADING...</div>
    <div id="splashSubtext">Please wait for the assets to load</div>
  </div>

  <div class="topbar" id="topbar">
    <div class="topbar-row1">
      <div class="topbar-brand">GN-Neon</div>
      <nav class="nav" aria-label="Primary">
        <button onclick="load('home')">Home</button>
        <button onclick="load('calc')">Calculators</button>
        <button onclick="load('games')">Games</button>
        <button onclick="load('about')">About</button>
        <button onclick="toggleVisualizerMode()" id="vizModeBtn" style="border: 1px solid #0044ff; background: rgba(0,0,255,0.1);">Visualizer</button>
      </nav>
      <div class="topbar-right">
        <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        <button id="muteBtn" onclick="toggleMute()">Mute</button>
      </div>
    </div>

    <!-- Music controls -->
    <div class="music-controls">
      <div class="music-info">
        <span class="music-title" id="mcTitle">Super Mario RPG</span>
        <span class="music-artist" id="mcArtist">Yoko Shimomura</span>
      </div>
      <div class="music-btn-row">
        <button class="music-btn" onclick="musicPrev()" title="Previous">&#9664;&#9664;</button>
        <button class="music-btn" id="mcPlayPause" onclick="musicPlayPause()" title="Play/Pause">&#9646;&#9646;</button>
        <button class="music-btn" onclick="musicNext()" title="Next">&#9654;&#9654;</button>
        <button class="music-btn" id="mcLoop" onclick="musicToggleLoop()" title="Loop">&#8635;</button>
      </div>
      <div class="music-seek-row">
        <span class="music-time" id="mcCurrent">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" oninput="musicSeek(this.value)">
        <span class="music-time" id="mcDuration">0:00</span>
      </div>
    </div>
  </div>

  <main class="page-shell" id="mainContent">
    <h1 class="site-title">GN-Neon</h1>
    <div id="content">Loading...</div>
  </main>

  <canvas id="visualizerCanvas"></canvas>

  <div class="version-tag" id="vTag">
    v0.40
  </div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let currentIndex = 0;
let isMuted = false;
let currentTrack = 0;
let isLooping = false;
let seekDragging = false;
let isVisualizerMode = false;

// ─── PLAYLIST ────────────────────────────────────────────────────────────────
const playlist = [
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Philly%20Nice%20(B-Side).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/dq%20blizzard.mp3'
];

const trackMeta = [
  { title: 'Super Mario RPG', artist: 'Yoko Shimomura' },
  { title: 'Philly Nice (B-Side)', artist: 'Unknown Artist' },
  { title: 'DQ Blizzard', artist: 'Unknown Artist' }
];

// ─── SPLASH LOGIC ────────────────────────────────────────────────────────────
function enterSite() {
  const overlay = document.getElementById('splashOverlay');
  if (overlay.classList.contains('ready')) {
    overlay.classList.add('fade-out');
    ensureAudioContext();
    const audio = document.getElementById('bgMusic');
    audio.play().catch(e => console.warn("Audio start blocked:", e));
  }
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioContextReady = false;

function ensureAudioContext() {
  if (audioContextReady) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const audio = document.getElementById('bgMusic');
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);

}

function initMusic() {
  const audio = document.getElementById('bgMusic');
  audio.src = playlist[currentTrack];
  audio.volume = 0.5;
  audio.addEventListener('ended', () => isLooping ? (audio.currentTime = 0, audio.play()) : musicNext());
  audio.addEventListener('timeupdate', updateSeekBar);
  audio.addEventListener('play', () => { document.getElementById('mcPlayPause').innerHTML = '&#9646;&#9646;'; });
  audio.addEventListener('pause', () => document.getElementById('mcPlayPause').innerHTML = '&#9654;');
  updateTrackDisplay();
}

function updateTrackDisplay() {
  document.getElementById('mcTitle').textContent = trackMeta[currentTrack].title;
  document.getElementById('mcArtist').textContent = trackMeta[currentTrack].artist;
}

function updateSeekBar() {
  if (seekDragging) return;
  const audio = document.getElementById('bgMusic'), bar = document.getElementById('seekBar');
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  bar.value = pct;
  bar.style.background = `linear-gradient(to right, #0044ff ${pct}%, #333 ${pct}%)`;
  document.getElementById('mcCurrent').textContent = fmtTime(audio.currentTime);
  document.getElementById('mcDuration').textContent = fmtTime(audio.duration);
}

function fmtTime(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

function musicPlayPause() { const a = document.getElementById('bgMusic'); ensureAudioContext(); a.paused ? a.play() : a.pause(); }
function musicNext() { currentTrack = (currentTrack + 1) % playlist.length; const a = document.getElementById('bgMusic'); a.src = playlist[currentTrack]; updateTrackDisplay(); a.play(); }
function musicPrev() { const a = document.getElementById('bgMusic'); if(a.currentTime > 3) a.currentTime = 0; else currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; a.src = playlist[currentTrack]; updateTrackDisplay(); a.play(); }

(function() {

// ─── VISUALIZER DRAW ─────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('visualizerCanvas'), ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);

  function draw() {
    requestAnimationFrame(draw);
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (!audioContextReady || !analyser) { drawIdle(ctx, W, H); return; }
    
    const bufferLength = analyser.frequencyBinCount, dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);
    
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    const maxHeight = H * 0.75;
    
    for (let i = 0; i < barCount; i++) {
      const rawVal = dataArray[i];
      let intensity = rawVal / 255;
      
      // Exaggerate contrast: Lows lower, Highs higher
      // Using power function to push quiet parts down
      intensity = Math.pow(intensity, 1.5);
      
      const barH = intensity * maxHeight;
      const x = i * (barW + gap);
      const y = H - barH;
      
      // Opacity: 0.5 (quietest) to 1.0 (loudest)
      const opacity = 0.5 + (intensity * 0.5);
      
      // Color: Normal blue (0,0,255)
      ctx.fillStyle = `rgba(0, 0, 255, ${opacity})`;
      ctx.fillRect(x, y, barW, barH);
    }
  }
  
  function drawIdle(ctx, W, H) {
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    for (let i = 0; i < barCount; i++) {
      ctx.fillStyle = 'rgba(0, 0, 255, 0.2)';
      ctx.fillRect(i * (barW + gap), H - 2, barW, 2);
    }
  }
  draw();
})();

function drawGraph() {
  const canvas = document.getElementById("grid"); if (!canvas) return;
  const ctx = canvas.getContext("2d"); ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
  const xminVal = parseFloat(xmin.value), xmaxVal = parseFloat(xmax.value), yminVal = parseFloat(ymin.value), ymaxVal = parseFloat(ymax.value), width = 400, height = 400;
  ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) { const x = i * (width / 10), y = i * (height / 10); ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
  ctx.strokeStyle = "white"; ctx.lineWidth = 2;
  const xZero = (-xminVal / (xmaxVal - xminVal)) * width, yZero = (ymaxVal / (ymaxVal - yminVal)) * height;
  ctx.beginPath(); ctx.moveTo(xZero, 0); ctx.lineTo(xZero, height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, yZero); ctx.lineTo(width, yZero); ctx.stroke();
  ctx.fillStyle = "white"; ctx.font = "10px Arial";
  for (let i = 0; i <= 10; i++) { const xVal = xminVal + (i / 10) * (xmaxVal - xminVal), yVal = yminVal + (i / 10) * (ymaxVal - yminVal), px = i * (width / 10), py = height - i * (height / 10); ctx.fillText(xVal.toFixed(1), px, yZero + 10); ctx.fillText(yVal.toFixed(1), xZero + 5, py); }
  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value], colors = ["red", "cyan", "lime", "yellow", "orange"];
  let resultsHTML = "<h3>Results</h3>"; const functions = [];
  eqs.forEach((expr, i) => {
    if (!expr) return; expr = expr.replace(/(\d)x/g, "$1*x");
    let fn; try { fn = (x) => eval(expr); functions.push({ fn, color: colors[i], expr }); } catch { return; }
    ctx.strokeStyle = colors[i]; ctx.lineWidth = 2; ctx.beginPath();
    let first = true;
    for (let px = 0; px <= width; px++) { const x = xminVal + (px / width) * (xmaxVal - xminVal); let y; try { y = fn(x); } catch { continue; } const py = ((ymaxVal - y) / (ymaxVal - yminVal)) * height; if (py >= 0 && py <= height) { if (first) { ctx.moveTo(px, py); first = false; } else { ctx.lineTo(px, py); } } }
    ctx.stroke();
    try { const y0 = fn(0); resultsHTML += `<p style="color:${colors[i]}">y=${expr} → y(0) = ${y0.toFixed(2)}</p>`; } catch {}
  });
  for (let i = 0; i < functions.length; i++) {
    for (let j = i + 1; j < functions.length; j++) {
      for (let x = xminVal; x <= xmaxVal; x += 0.1) {
        let y1, y2; try { y1 = functions[i].fn(x); y2 = functions[j].fn(x); } catch { continue; }
        if (Math.abs(y1 - y2) < 0.1) { resultsHTML += `<p>Intersection ≈ (${x.toFixed(2)}, ${y1.toFixed(2)})</p>`; break; }
      }
    }
  }
  let existing = document.getElementById("graphResults"); if (!existing) { const div = document.createElement("div"); div.id = "graphResults"; canvas.parentElement.appendChild(div); existing = div; } existing.innerHTML = resultsHTML;
}

function updateGame() {
  const f = document.getElementById("scratchFrame"); if (!f) return;
  f.src = games[currentIndex]; gameTitle.innerText = titles[currentIndex];
  document.getElementById("gameControls").innerHTML = controls[currentIndex] || "";
  document.getElementById("gameNotes").innerHTML = notes[currentIndex] || "";
}

function nextGame() { currentIndex = (currentIndex + 1) % games.length; updateGame(); }
function prevGame() { currentIndex = (currentIndex - 1 + games.length) % games.length; updateGame(); }

function setVideoBackground(videoUrl) {
  const video = document.createElement('video');
  video.id = 'videoBg'; video.autoplay = true; video.loop = true; video.muted = true; video.src = videoUrl;
  video.addEventListener('canplay', () => {
    const splash = document.getElementById('splashOverlay');
    splash.classList.add('ready');
    document.getElementById('splashText').innerText = "!!!WARNING MUSIC WILL PLAY!!!";
    document.getElementById('splashSubtext').innerText = "CLICK TO ENTER";
  });
  document.body.insertBefore(video, document.body.firstChild);
  document.body.classList.add('video-bg');
}

load("home");
setVideoBackground('https://raw.githubusercontent.com/Neon64makoto/GN-Neon/main/Files/FlatlineLoop.mp4');
initMusic();
</script>
