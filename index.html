<!DOCTYPE html>
<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8" />
<style>
  body { background:black; color:white; font-family:Arial,sans-serif; margin:0; padding:0; }
  input { margin:4px; font-size:1em; }
  button { margin:4px; font-size:1em; padding:8px 12px; border:none; border-radius:4px; background:#444; color:white; cursor:pointer; }
  button:hover { background:#666; }
  #scratchFrame { width:80vw; height:70vh; border:none; }
  #content {
    width: 100%;
    min-height: calc(100vh - 150px);
    box-sizing: border-box;
    padding: 20px;
  }
  /* Responsive font size for smaller screens */
  @media(max-width: 800px){
    body { font-size: 1.2em; }
  }
  /* Styling for version counter */
  #versionCounter {
    font-size: 14px;
    font-family: 'Courier New', monospace;
    background: rgba(255,255,255,0.1);
    padding: 4px 8px;
    border-radius: 8px;
  }
  /* Style for the axes labels in the graph */
  #axesLabels {
    position: absolute;
    font-size: 0.9em;
    color: #ccc;
  }
</style>
</head>
<body>

<h1 style="text-align:center;">GN-Gassy</h1>

<hr>

<!-- Navigation -->
<div style="text-align:center;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>
<hr>

<div id="content">Loading...</div>

<!-- Version counter -->
<div id="versionCounter" style="position:fixed; bottom:10px; right:20px; color:gray;">v0.13</div>

<script>
// ------------- PAGES -------------
const pages = {
  home: `
    <h2>Home</h2>
    <p>Welcome to GN-Gassy.</p>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200" style="border-radius:8px;"><br><br>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200" style="border-radius:8px;">
  `,
  calc: `
    <h2>Calculators</h2>
    <button onclick="showCalc('simple')">Simple Calculator</button>
    <button onclick="showCalc('volume')">Volume Calculator</button>
    <button onclick="showCalc('graph')">Graph Calculator</button>
    <div id="calcContent"></div>
  `,
  games: `
    <h2>Scratch Games</h2>
    <div style="text-align:center; position: relative;">
      <button onclick="prevGame()">◀</button>
      <button onclick="nextGame()">▶</button>
      <br><br>
      <iframe id="scratchFrame" src="" allowfullscreen></iframe>
      <h3 id="gameTitle" style="margin-top:10px;"></h3>
    </div>
  `,
  about: `
    <h2>About</h2>
    <p>GN-Gassy is a simple injected tool site with calculators, volume calculators, and games.</p>
  `
};

// Load page and initialize
function load(page){
  document.getElementById("content").innerHTML = pages[page];
  if(page==='graph') drawGraph();
  if(page==='games') {
    currentIndex = 0;
    updateGame();
  }
}

// ------------- CALCULATOR HANDLER -------------
function showCalc(type){
  const c = document.getElementById("calcContent");
  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3" style="width:200px;">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  } else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>
      Cube: <input id="cubeSide" placeholder="Side" style="width:80px;"> <button onclick="volCube()">Calc</button><p id="cubeOut"></p>
      Sphere: <input id="sphereR" placeholder="Radius" style="width:80px;"> <button onclick="volSphere()">Calc</button><p id="sphereOut"></p>
      Rectangle: Length<input id="recL" placeholder="L" style="width:80px;"> 
                 Width<input id="recW" placeholder="W" style="width:80px;"> 
                 Height<input id="recH" placeholder="H" style="width:80px;">
      <button onclick="volRect()">Calc</button><p id="rectOut"></p>
      Cylinder: Radius<input id="cylR" placeholder="R" style="width:80px;"> 
                Height<input id="cylH" placeholder="H" style="width:80px;">
      <button onclick="volCyl()">Calc</button><p id="cylOut"></p>
      Pyramid: Base<input id="pyrB" placeholder="Base area" style="width:80px;"> 
               Height<input id="pyrH" placeholder="H" style="width:80px;">
      <button onclick="volPyr()">Calc</button><p id="pyrOut"></p>
    `;
  } else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>
      X Range: <input id="xmin" value="-10" style="width:50px;"> to <input id="xmax" value="10" style="width:50px;"><br>
      Y Range: <input id="ymin" value="-10" style="width:50px;"> to <input id="ymax" value="10" style="width:50px;"><br><br>
      y=<input id="eq1" placeholder="x*x" style="width:150px;"><br>
      y=<input id="eq2" placeholder="" style="width:150px;"><br>
      y=<input id="eq3" placeholder="" style="width:150px;"><br>
      y=<input id="eq4" placeholder="" style="width:150px;"><br><br>
      <button onclick="drawGraph()">Graph</button><br><br>
      <div style="position: relative;">
        <canvas id="grid" width="400" height="400" style="border:1px solid white; display:block; margin:auto;"></canvas>
        <div id="axesLabels"></div>
      </div>
    `;
  }
}

// ------------- SIMPLE CALC -------------
function calcSimple(){
  const val = document.getElementById('simpleInput').value;
  try { document.getElementById('simpleOut').innerText = "Result: "+eval(val); }
  catch(e){ document.getElementById('simpleOut').innerText = "Invalid expression"; }
}

// ------------- VOLUME CALCS -------------
function volCube(){ 
  const side = document.getElementById('cubeSide');
  const val = parseFloat(side.value);
  if(!isNaN(val))
    document.getElementById('cubeOut').innerText = "Volume: " + (val*val*val);
  else
    document.getElementById('cubeOut').innerText = "Invalid input";
}
function volSphere(){ 
  const r = document.getElementById('sphereR');
  const val = parseFloat(r.value);
  if(!isNaN(val))
    document.getElementById('sphereOut').innerText = "Volume: " + ((4/3)*Math.PI*Math.pow(val,3));
  else
    document.getElementById('sphereOut').innerText = "Invalid input";
}
function volRect(){ 
  const l = parseFloat(document.getElementById('recL').value);
  const w = parseFloat(document.getElementById('recW').value);
  const h = parseFloat(document.getElementById('recH').value);
  if([l,w,h].every(v => !isNaN(v)))
    document.getElementById('rectOut').innerText = "Volume: " + (l*w*h);
  else
    document.getElementById('rectOut').innerText = "Invalid input";
}
function volCyl(){ 
  const r = parseFloat(document.getElementById('cylR').value);
  const h = parseFloat(document.getElementById('cylH').value);
  if(!isNaN(r) && !isNaN(h))
    document.getElementById('cylOut').innerText = "Volume: " + (Math.PI*Math.pow(r,2)*h);
  else
    document.getElementById('cylOut').innerText = "Invalid input";
}
function volPyr(){ 
  const b = parseFloat(document.getElementById('pyrB').value);
  const h = parseFloat(document.getElementById('pyrH').value);
  if(!isNaN(b) && !isNaN(h))
    document.getElementById('pyrOut').innerText = "Volume: " + (b*h/3);
  else
    document.getElementById('pyrOut').innerText = "Invalid input";
}

// ------------- GAMES -------------
const games = [
  "https://turbowarp.org/1143765424/embed?addons=pause&fps=60",
  "https://turbowarp.org/1075310827/embed?addons=pause&fps=60",
  "https://turbowarp.org/941803602/embed?addons=pause&fps=60",
  "https://turbowarp.org/973637218/embed?addons=pause&fps=60",
  "https://turbowarp.org/883776962/embed?addons=pause&fps=60",
  "https://turbowarp.org/898492644/embed?addons=pause&fps=60",
  "https://turbowarp.org/916303075/embed?addons=pause&fps=60",
  "https://turbowarp.org/978483855/embed?addons=pause&fps=60",
  "https://turbowarp.org/959847748/embed?addons=pause&fps=60"
];

const titles = [
  "Sisyphean Escalator","Gambling but Mid","Laser Dodge","Goober Dodger",
  "Neon's Hostile Road","Mid Cookie Clicker","Asteroid Assault",
  "Reel 'Em In","Rat Catcher"
];

let currentIndex = 0;

function updateGame(){
  const f = document.getElementById("scratchFrame");
  if(!f) return;
  f.src = games[currentIndex];
  document.getElementById("gameTitle").innerText = titles[currentIndex];
}

function nextGame(){ currentIndex = (currentIndex+1) % games.length; updateGame(); }
function prevGame(){ currentIndex = (currentIndex-1+games.length) % games.length; }

// ------------- GRAPH DRAWING -------------
function drawGraph() {
  const canvas = document.getElementById('grid');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Get ranges
  const xmin = parseFloat(document.getElementById('xmin').value);
  const xmax = parseFloat(document.getElementById('xmax').value);
  const ymin = parseFloat(document.getElementById('ymin').value);
  const ymax = parseFloat(document.getElementById('ymax').value);

  // Draw grid lines
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1;

  // Draw vertical grid lines and labels
  const gridXCount = 10;
  for(let i=0; i<=gridXCount; i++){
    const x = xmin + i*(xmax - xmin)/gridXCount;
    const px = (x - xmin) / (xmax - xmin) * canvas.width;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, canvas.height);
    ctx.stroke();

    // Add labels
    if(i===0 || i===gridXCount || (x >= xmin && x <= xmax)){
      document.getElementById('axesLabels').innerHTML += `<div style="position:absolute; left:${px}px; bottom:0; transform:translateX(-50%) translateY(10px); font-size:0.8em; color:#ccc;">${x.toFixed(1)}</div>`;
    }
  }

  // Draw horizontal grid lines and labels
  const gridYCount = 10;
  for(let i=0; i<=gridYCount; i++){
    const yVal = ymin + i*(ymax - ymin)/gridYCount;
    const py = (ymax - yVal) / (ymax - ymin) * canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, py);
    ctx.lineTo(canvas.width, py);
    ctx.stroke();

    // Add labels
    if(i===0 || i===gridYCount || (yVal >= ymin && yVal <= ymax)){
      document.getElementById('axesLabels').innerHTML += `<div style="position:absolute; left:0; bottom:${py}px; transform:translateY(0); font-size:0.8em; color:#ccc;">${yVal.toFixed(1)}</div>`;
    }
  }

  // Plot functions
  const functions = [
    document.getElementById('eq1').value,
    document.getElementById('eq2').value,
    document.getElementById('eq3').value,
    document.getElementById('eq4').value
  ];

  functions.forEach((expr, index) => {
    if (!expr.trim()) return;
    ctx.beginPath();
    ctx.strokeStyle = ['red', 'yellow', 'cyan', 'magenta'][index];
    let firstPoint = true;
    for (let px=0; px<=canvas.width; px++){
      const x = xmin + (px / canvas.width) * (xmax - xmin);
      let y;
      try {
        y=eval(expr.replace(/x/g, `(${x})`));
      } catch {
        continue;
      }
      const py = (ymax - y) / (ymax - ymin) * canvas.height;
      if (py >= 0 && py <= canvas.height){
        if (firstPoint){
          ctx.moveTo(px, py);
          firstPoint = false;
        } else {
          ctx.lineTo(px, py);
        }
      }
    }
    ctx.stroke();
  });
}

// Initialize first game
load("home");
updateGame();

</script>
</body>
</html>
