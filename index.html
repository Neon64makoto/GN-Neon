<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Gassy</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --accent: #0006ff;
      --accent-soft: rgba(0, 0, 200, 0.14);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: Arial, sans-serif;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Video loading state */
    body.video-loading::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 999;
      pointer-events: none;
    }

    @keyframes loading-stripes {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 40px 40px;
      }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #0600ff;
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0044ff;
    }

    /* Firefox scrollbar styling */
    * {
      scrollbar-color: #0600ff #0a0a0a;
      scrollbar-width: thin;
    }

    body.video-bg {
      background: none;
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: #0900ad;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: #0044ff;
      border-color: ##1100ff;
      box-shadow: 0 0 35px rgba(0, 0, 255, 0.95);
      transform: translateY(-1px);
    }

    input {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(17, 17, 17, 0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 1rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
    }

    .nav {
      text-align: center;
    }

    .topbar-brand {
      position: absolute;
      left: 1rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #0600ff;
      letter-spacing: 1px;
    }

    .topbar-right {
      position: absolute;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    #muteBtn {
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      min-width: 60px;
    }

    .page-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .site-title {
      margin: 0.5rem 0 1.5rem;
      text-align: center;
      letter-spacing: 0.04em;
      font-size: 3rem;
    }

    #content {
      width: 100%;
      min-height: calc(100vh - 200px);
      padding: 1rem 0 2rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), rgba(0, 0, 150, 0.5));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
    }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 1.5rem;
      align-items: start;
    }
    .games-panel {
      padding: 0;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), rgba(0, 0, 150, 0.5));
    }

    .games-panel h2 {
      padding: 2rem 2rem 1rem 2rem;
      margin: 0;
    }

    .games-menu {
      padding: 0 2rem;
    }

    #gamesContent {
      width: 100%;
    }

    .hero-panel h2,
    .patch-panel h3,
    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      margin-top: 0;
      font-size: 2rem;
    }

    .lead {
      color: #d2d2d2;
      line-height: 1.6;
      font-size: 1.15rem;
    }

    .image-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .image-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }

    .image-card img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .image-card span {
      display: block;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .patch-panel {
      padding: 2rem;
      position: relative;
      overflow: hidden;
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }



    .version-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 225, 1);
      background: rgba(0, 0, 150, 0.08);
      color: var(--accent);
      font-size: 0.9rem;
    }

    .patch-list {
      margin: 1rem 0 0;
      padding-left: 1.5rem;
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .patch-list li + li {
      margin-top: 0.75rem;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .calc-panel,
    .games-panel,
    .about-panel {
      padding: 2rem;
    }

    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      font-size: 2rem;
    }

    .calc-panel h3,
    .games-panel h3,
    .about-panel h3 {
      font-size: 1.5rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #scratchFrame {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 10px;
      background: #000;
    }

    .games-layout {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      padding: 1rem 2rem 2rem 2rem;
    }

    .games-menu {
      text-align: center;
    }

    .games-menu button {
      display: block;
      width: 100%;
      margin: 0.75rem auto;
      font-size: 1.2rem;
      padding: 1rem 1.5rem;
    }

    .back-button {
      display: block;
      margin: 1rem auto 2rem;
      font-size: 1rem;
      padding: 0.7rem 1.2rem;
    }

    .wip-container {
      text-align: center;
      padding: 3rem 1rem;
    }

    .wip-container h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .wip-container p {
      color: #b3b3b3;
      font-size: 1.2rem;
    }

    .sideBox {
      width: 20%;
      padding: 1.25rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      overflow-y: auto;
      height: 70vh;
      box-shadow: var(--shadow);
      font-size: 1rem;
    }

    .centerBox {
      width: 70%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .sideBox {
      flex-shrink: 0;
    }

    #gameControls,
    #gameNotes {
      white-space: pre-line;
      color: #ddd;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }

    #grid {
      border: 1px solid white;
      background: #000;
    }

    #axesLabels {
      position: absolute;
      font-size: 0.8em;
      color: #ccc;
    }

    #graphResults {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: left;
      font-size: 1.05rem;
    }

    .version-tag {
      position: fixed;
      bottom: 5px;
      right: 10px;
      color: gray;
      font-size: 0.85rem;
    }

    /* Responsive scaling */
    @media (max-width: 1200px) {
      html,
      body {
        font-size: 15px;
      }

      .site-title {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 960px) {
      html,
      body {
        font-size: 14px;
      }

      .site-title {
        font-size: 2.2rem;
      }

      .home-grid {
        grid-template-columns: 1fr;
      }

      .games-layout {
        flex-direction: column;
      }

      .sideBox,
      .centerBox {
        width: 100%;
      }

      .patch-panel h3 {
        font-size: 1.3rem;
      }

      .patch-panel {
        max-height: 400px;
      }
    }
    }

    @media (max-width: 768px) {
      html,
      body {
        font-size: 13px;
      }

      .page-shell {
        padding: 1.5rem 1rem;
      }

      .site-title {
        font-size: 1.8rem;
        margin: 0.5rem 0 1rem;
      }

      .hero-panel,
      .patch-panel,
      .calc-panel,
      .games-panel,
      .about-panel {
        padding: 1.5rem;
      }

      .patch-panel {
        max-height: 350px;
      }

      .topbar {
        gap: 1rem;
      }

      .topbar-right {
        right: 0.5rem;
      }

      .hero-panel h2,
      .patch-panel h3,
      .calc-panel h2,
      .games-panel h2,
      .about-panel h2 {
        font-size: 1.5rem;
      }

      .image-row {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .sideBox {
        padding: 1rem;
        font-size: 0.9rem;
      }

      #scratchFrame {
        height: 50vh;
      }

      button {
        margin: 0.4rem;
        font-size: 1rem;
        padding: 0.6rem 0.8rem;
      }

      input {
        margin: 0.4rem;
        font-size: 1rem;
        padding: 0.6rem 0.6rem;
      }
    }

    @media (max-width: 480px) {
      html,
      body {
        font-size: 12px;
      }

      .page-shell {
        padding: 1rem 0.75rem;
      }

      .site-title {
        font-size: 1.5rem;
        margin: 0.4rem 0 0.8rem;
      }

      .hero-panel,
      .patch-panel,
      .calc-panel,
      .games-panel,
      .about-panel {
        padding: 1rem;
      }

      .hero-panel h2,
      .patch-panel h3,
      .calc-panel h2,
      .games-panel h2,
      .about-panel h2 {
        font-size: 1.3rem;
      }

      .button-row {
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      button {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.6rem;
      }

      input {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.5rem;
      }

      .sideBox {
        padding: 0.75rem;
        font-size: 0.85rem;
      }

      #scratchFrame {
        height: 40vh;
      }

      .games-layout {
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>  <div class="topbar">
  <div class="topbar-brand">GN-Gassy</div>
  <nav class="nav" aria-label="Primary">
    <button onclick="load('home')">Home</button>
    <button onclick="load('calc')">Calculators</button>
    <button onclick="load('games')">Games</button>
    <button onclick="load('about')">About</button>
  </nav>
  <div class="topbar-right">
    <button id="muteBtn" onclick="toggleMute()">Mute</button>
  </div>
</div>

<main class="page-shell">
  <h1 class="site-title">GN-Gassy</h1>
  <div id="content">Loading...</div>
</main>


<div class="version-tag"> 
    v0.37
</div>
// Always change version number!
<script>
// GN-Gassy behavior: keep the site fast and direct, preserve the original utility feel, and organize page logic clearly.

const pages = {
  home: `
    <section class="home-grid">
      <article class="panel hero-panel">
        <h2>Home</h2>
        <p class="lead">Welcome to GN-Gassy. Take a look at these cats.</p>
        <div class="image-row">
          <figure class="image-card">
            <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" alt="Cat image from GN-Gassy">
            <span>sili2.jpg</span>
          </figure>
          <figure class="image-card">
            <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" alt="Cat image from GN-Gassy">
            <span>sili3.jpg</span>
          </figure>
        </div>
      </article>

      <aside class="panel patch-panel">
        <div class="version-chip">Latest patch · v0.37</div>
        <h3>Patch Notes</h3>
        <p class="section-copy">Recent changes to the homepage and site structure.</p>
        <ul class="patch-list">
          <li>Some minor changes.</li>
          <li>Changed the <strong>color</strong> of the buttons.</li>
          <li>Changed the <strong>color</strong> of most of the UI.</li>
          <li>Added background video that is <strong>.mp4.</strong></li>
        </ul>
      </aside>
    </section>
  `,

  calc: `
    <section class="panel calc-panel">
      <h2>Calculators</h2>
      <div class="button-row">
        <button onclick="showCalc('simple')">Simple</button>
        <button onclick="showCalc('volume')">Volume</button>
        <button onclick="showCalc('graph')">Graph</button>
      </div>
      <div id="calcArea"></div>
    </section>
  `,

  games: `
    <section class="panel games-panel">
      <h2>Games</h2>
      <div class="games-menu" id="gamesMenu">
        <button onclick="showScratchGames()">Scratch Games</button>
        <button onclick="showEmulators()">Emulators</button>
      </div>
      <div id="gamesContent"></div>
    </section>
  `,

  about: `
    <section class="panel about-panel">
      <h2>About</h2>
      <p class="section-copy">This is GN-Gassy.</p>
    </section>
  `
};

function load(page) {
  document.getElementById("content").innerHTML = pages[page];
  // Show games menu when returning to games page
  if (page === 'games') {
    setTimeout(() => {
      const gamesMenu = document.querySelector('.games-menu');
      if (gamesMenu) gamesMenu.style.display = 'block';
    }, 0);
  }
}

function enterRun(e, fn) {
  if (e.key === "Enter") fn();
}

function showCalc(type) {
  const c = document.getElementById("calcArea");

  if (type === "simple") {
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3" onkeydown="enterRun(event, calcSimple)">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  } else if (type === "volume") {
    c.innerHTML = `
      <h3>Volume Calculator</h3>

      Cube (Side):
      <input id="cubeSide" onkeydown="enterRun(event, volCube)">
      <button onclick="volCube()">Calc</button>
      <p id="cubeOut"></p>

      Sphere (Radius):
      <input id="sphereR" onkeydown="enterRun(event, volSphere)">
      <button onclick="volSphere()">Calc</button>
      <p id="sphereOut"></p>

      Rectangular Prism (Length, Width, Height):
      <input id="recL" placeholder="Length" onkeydown="enterRun(event, volRect)">
      <input id="recW" placeholder="Width" onkeydown="enterRun(event, volRect)">
      <input id="recH" placeholder="Height" onkeydown="enterRun(event, volRect)">
      <button onclick="volRect()">Calc</button>
      <p id="rectOut"></p>

      Cylinder (Radius, Height):
      <input id="cylR" placeholder="Radius" onkeydown="enterRun(event, volCyl)">
      <input id="cylH" placeholder="Height" onkeydown="enterRun(event, volCyl)">
      <button onclick="volCyl()">Calc</button>
      <p id="cylOut"></p>

      Pyramid (Base Area, Height):
      <input id="pyrB" placeholder="Base Area" onkeydown="enterRun(event, volPyr)">
      <input id="pyrH" placeholder="Height" onkeydown="enterRun(event, volPyr)">
      <button onclick="volPyr()">Calc</button>
      <p id="pyrOut"></p>
    `;
  } else if (type === "graph") {
    c.innerHTML = `
      <h3>Graph Calculator</h3>

      X: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq2" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq3" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq4" onkeydown="enterRun(event, drawGraph)"><br>
      y=<input id="eq5" onkeydown="enterRun(event, drawGraph)"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <div class="canvas-wrap">
        <canvas id="grid" width="400" height="400"></canvas>
        <div id="axesLabels"></div>
      </div>
    `;
  }
}

function calcSimple() {
  try {
    simpleOut.innerText = eval(simpleInput.value);
  } catch {
    simpleOut.innerText = "Error";
  }
}

function volCube() {
  const v = parseFloat(cubeSide.value);
  cubeOut.innerText = !isNaN(v) ? v ** 3 : "Invalid";
}

function volSphere() {
  const v = parseFloat(sphereR.value);
  sphereOut.innerText = !isNaN(v) ? (4 / 3) * Math.PI * v ** 3 : "Invalid";
}

function volRect() {
  const l = parseFloat(recL.value);
  const w = parseFloat(recW.value);
  const h = parseFloat(recH.value);
  rectOut.innerText = !isNaN(l) && !isNaN(w) && !isNaN(h) ? l * w * h : "Invalid";
}

function volCyl() {
  const r = parseFloat(cylR.value);
  const h = parseFloat(cylH.value);
  cylOut.innerText = !isNaN(r) && !isNaN(h) ? Math.PI * r * r * h : "Invalid";
}

function volPyr() {
  const b = parseFloat(pyrB.value);
  const h = parseFloat(pyrH.value);
  pyrOut.innerText = !isNaN(b) && !isNaN(h) ? (b * h) / 3 : "Invalid";
}

function drawGraph() {
  const canvas = document.getElementById("grid");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 400, 400);

  const xminVal = parseFloat(xmin.value);
  const xmaxVal = parseFloat(xmax.value);
  const yminVal = parseFloat(ymin.value);
  const ymaxVal = parseFloat(ymax.value);

  const width = 400;
  const height = 400;

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const x = i * (width / 10);
    const y = i * (height / 10);

    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(width, y);
    ctx.stroke();
  }

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  const xZero = (-xminVal / (xmaxVal - xminVal)) * width;
  const yZero = (ymaxVal / (ymaxVal - yminVal)) * height;

  ctx.beginPath();
  ctx.moveTo(xZero, 0);
  ctx.lineTo(xZero, height);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, yZero);
  ctx.lineTo(width, yZero);
  ctx.stroke();

  ctx.fillStyle = "white";
  ctx.font = "10px Arial";

  for (let i = 0; i <= 10; i++) {
    const xVal = xminVal + (i / 10) * (xmaxVal - xminVal);
    const yVal = yminVal + (i / 10) * (ymaxVal - yminVal);

    const px = i * (width / 10);
    const py = height - i * (height / 10);

    ctx.fillText(xVal.toFixed(1), px, yZero + 10);
    ctx.fillText(yVal.toFixed(1), xZero + 5, py);
  }

  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value];
  const colors = ["red", "cyan", "lime", "yellow", "orange"];
  let resultsHTML = "<h3>Results</h3>";
  const functions = [];

  eqs.forEach((expr, i) => {
    if (!expr) return;

    expr = expr.replace(/(\d)x/g, "$1*x");

    let fn;
    try {
      fn = (x) => eval(expr);
      functions.push({ fn, color: colors[i], expr });
    } catch {
      return;
    }

    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for (let px = 0; px <= width; px++) {
      const x = xminVal + (px / width) * (xmaxVal - xminVal);
      let y;

      try {
        y = fn(x);
      } catch {
        continue;
      }

      const py = ((ymaxVal - y) / (ymaxVal - yminVal)) * height;

      if (py >= 0 && py <= height) {
        if (first) {
          ctx.moveTo(px, py);
          first = false;
        } else {
          ctx.lineTo(px, py);
        }
      }
    }

    ctx.stroke();

    try {
      const y0 = fn(0);
      resultsHTML += `<p style="color:${colors[i]}">y=${expr} → y(0) = ${y0.toFixed(2)}</p>`;
    } catch {}
  });

  for (let i = 0; i < functions.length; i++) {
    for (let j = i + 1; j < functions.length; j++) {
      for (let x = xminVal; x <= xmaxVal; x += 0.1) {
        let y1;
        let y2;
        try {
          y1 = functions[i].fn(x);
          y2 = functions[j].fn(x);
        } catch {
          continue;
        }

        if (Math.abs(y1 - y2) < 0.1) {
          resultsHTML += `<p>Intersection ≈ (${x.toFixed(2)}, ${y1.toFixed(2)})</p>`;
          break;
        }
      }
    }
  }

  let existing = document.getElementById("graphResults");
  if (!existing) {
    const div = document.createElement("div");
    div.id = "graphResults";
    canvas.parentElement.appendChild(div);
    existing = div;
  }

  existing.innerHTML = resultsHTML;
}

let currentIndex = 0;
let isMuted = false;

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  
  if (isMuted) {
    btn.innerText = 'Unmute';
    btn.style.background = '#555';
    // Mute all audio elements
    document.querySelectorAll('audio').forEach(el => {
      el.muted = true;
    });
    // Mute iframes by setting volume to 0 via postMessage (for Scratch)
    document.querySelectorAll('iframe').forEach(el => {
      try {
        el.contentWindow.postMessage({type: 'mute'}, '*');
      } catch (e) {}
    });
  } else {
    btn.innerText = 'Mute';
    btn.style.background = '#444';
    // Unmute all audio elements
    document.querySelectorAll('audio').forEach(el => {
      el.muted = false;
    });
    // Unmute iframes
    document.querySelectorAll('iframe').forEach(el => {
      try {
        el.contentWindow.postMessage({type: 'unmute'}, '*');
      } catch (e) {}
    });
  }
}

function setVideoBackground(videoUrl) {
  // Show loading animation
  document.body.classList.add('video-loading');
  
  const video = document.createElement('video');
  video.id = 'videoBg';
  video.autoplay = true;
  video.loop = true;
  video.muted = true;
  video.src = videoUrl;
  
  // Remove loading animation when video can play
  video.addEventListener('canplay', () => {
    document.body.classList.remove('video-loading');
  });
  
  document.body.insertBefore(video, document.body.firstChild);
  document.body.classList.add('video-bg');
}

function updateGame() {
  const f = document.getElementById("scratchFrame");
  if (!f) return;
  f.src = games[currentIndex];
  gameTitle.innerText = titles[currentIndex];
  document.getElementById("gameControls").innerHTML = controls[currentIndex] || "";
  document.getElementById("gameNotes").innerHTML = notes[currentIndex] || "";
}

function nextGame() {
  currentIndex = (currentIndex + 1) % games.length;
  updateGame();
}

function prevGame() {
  currentIndex = (currentIndex - 1 + games.length) % games.length;
  updateGame();
}
