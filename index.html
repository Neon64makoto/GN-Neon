<!DOCTYPE html>
<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8">
<style>
  body { background:black; color:white; font-family:Arial,sans-serif; }
  input { margin:2px; }
  button { margin:2px; }
  #scratchFrame { width:80vw; height:70vh; border:none; }
</style>
</head>
<body>

<h1>GN-Gassy</h1>

<hr>

<!-- Navigation -->
<button onclick="load('home')">Home</button>
<button onclick="load('calc')">Calculators</button>
<button onclick="load('games')">Games</button>
<button onclick="load('about')">About</button>
<hr>

<div id="content">Loading...</div>

<!-- Version counter -->
<div id="versionCounter" style="position:fixed; bottom:5px; right:10px; color:gray; font-size:12px;">
  v0.13 <!-- IMPORTANT: Increment this decimal every time the code is changed -->
</div>

<script>
// ------------- PAGES -------------
const pages = {
  home: `
    <h2>Home</h2>
    <p>Welcome to GN-Gassy.</p>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200"><br><br>
    <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200">
  `,

  calc: `
    <h2>Calculators</h2>
    <button onclick="showCalc('simple')">Simple Calculator</button>
    <button onclick="showCalc('volume')">Volume Calculator</button>
    <button onclick="showCalc('graph')">Graph Calculator</button>
    <div id="calcContent"></div>
  `,

  games: `
    <h2>Scratch Games</h2>
    <div style="text-align:center;">
      <button onclick="prevGame()">◀</button>
      <button onclick="nextGame()">▶</button>
      <button onclick="fullscreenGame()">⛶ Fullscreen</button>
      <br><br>
      <iframe id="scratchFrame" src="" allowfullscreen></iframe>
      <h3 id="gameTitle"></h3>
    </div>
  `,

  about: `
    <h2>About</h2>
    <p>GN-Gassy is a simple injected tool site with calculators, volume calculators, and games.</p>
  `
};

// ------------- PAGE LOADER -------------
function load(page){
  document.getElementById("content").innerHTML = pages[page];
  if(page==='graph') drawGraph(); // optional initial graph
}

// ------------- CALCULATOR HANDLER -------------
function showCalc(type){
  const c = document.getElementById("calcContent");
  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  } else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>
      Cube: <input id="cubeSide" placeholder="Side"> <button onclick="volCube()">Calc</button><p id="cubeOut"></p>
      Sphere: <input id="sphereR" placeholder="Radius"> <button onclick="volSphere()">Calc</button><p id="sphereOut"></p>
      Rectangle: Length<input id="recL" placeholder="L"> Width<input id="recW" placeholder="W"> Height<input id="recH" placeholder="H">
      <button onclick="volRect()">Calc</button><p id="rectOut"></p>
      Cylinder: Radius<input id="cylR" placeholder="R"> Height<input id="cylH" placeholder="H"><button onclick="volCyl()">Calc</button><p id="cylOut"></p>
      Pyramid: Base<input id="pyrB" placeholder="Base area"> Height<input id="pyrH" placeholder="H"><button onclick="volPyr()">Calc</button><p id="pyrOut"></p>
    `;
  } else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>
      X Range: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y Range: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>
      y=<input id="eq1" placeholder="x*x"><br>
      y=<input id="eq2" placeholder=""><br>
      y=<input id="eq3" placeholder=""><br>
      y=<input id="eq4" placeholder=""><br><br>
      <button onclick="drawGraph()">Graph</button><br><br>
      <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
    `;
  }
}

// ------------- SIMPLE CALC -------------
function calcSimple(){
  const val = document.getElementById('simpleInput').value;
  try { document.getElementById('simpleOut').innerText = "Result: "+eval(val); }
  catch(e){ document.getElementById('simpleOut').innerText = "Invalid expression"; }
}

// ------------- VOLUME CALCS -------------
function volCube(){ document.getElementById('cubeOut').innerText = "Volume: "+(parseFloat(cubeSide.value)**3); }
function volSphere(){ document.getElementById('sphereOut').innerText = "Volume: "+((4/3)*Math.PI*parseFloat(sphereR.value)**3); }
function volRect(){ document.getElementById('rectOut').innerText = "Volume: "+(parseFloat(recL.value)*parseFloat(recW.value)*parseFloat(recH.value)); }
function volCyl(){ document.getElementById('cylOut').innerText = "Volume: "+(Math.PI*parseFloat(cylR.value)**2*parseFloat(cylH.value)); }
function volPyr(){ document.getElementById('pyrOut').innerText = "Volume: "+(parseFloat(pyrB.value)*parseFloat(pyrH.value)/3); }

// ------------- GAMES -------------
const games = [
  "https://turbowarp.org/1143765424/embed?addons=pause&fps=60",
  "https://turbowarp.org/1075310827/embed?addons=pause&fps=60",
  "https://turbowarp.org/941803602/embed?addons=pause&fps=60",
  "https://turbowarp.org/973637218/embed?addons=pause&fps=60",
  "https://turbowarp.org/883776962/embed?addons=pause&fps=60",
  "https://turbowarp.org/898492644/embed?addons=pause&fps=60",
  "https://turbowarp.org/916303075/embed?addons=pause&fps=60",
  "https://turbowarp.org/978483855/embed?addons=pause&fps=60",
  "https://turbowarp.org/959847748/embed?addons=pause&fps=60"
];

const titles = [
  "Sisyphean Escalator","Gambling but Mid","Laser Dodge","Goober Dodger",
  "Neon's Hostile Road","Mid Cookie Clicker","Asteroid Assault",
  "Reel 'Em In","Rat Catcher"
];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }
function fullscreenGame(){
  const f=document.getElementById("scratchFrame");
  if(f.requestFullscreen) f.requestFullscreen();
  else if(f.webkitRequestFullscreen) f.webkitRequestFullscreen();
  else if(f.msRequestFullscreen) f.msRequestFullscreen();
}

// ------------- INIT -------------
load("home");
updateGame();
</script>

</body>
</html>
